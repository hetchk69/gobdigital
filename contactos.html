<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Directorio de Contactos — DIGER</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --azul:#0a2d6e;--azul-m:#1455a4;--azul-c:#e8f0ff;
  --gris:#eef1f7;--borde:#dde4f0;--texto:#1c2333;--muted:#64748b;
  --verde:#16a34a;--rojo:#dc2626;--blanco:#fff;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;color:var(--texto);background:var(--gris);min-height:100vh}
.container{max-width:1100px;margin:0 auto;padding:2rem 1rem 3rem}

/* ── TOOLBAR ── */
.toolbar{
  display:flex;align-items:center;gap:10px;
  background:var(--blanco);border:1px solid var(--borde);border-radius:12px;
  padding:12px 16px;margin-bottom:1.5rem;
  box-shadow:0 2px 8px rgba(10,45,110,.05);flex-wrap:wrap;
}
.toolbar-title{font-size:15px;font-weight:800;color:var(--azul);margin-right:auto}
.search-wrap{position:relative;flex:1;min-width:180px;max-width:300px}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.search-inp{
  width:100%;padding:8px 12px 8px 34px;border:1.5px solid var(--borde);border-radius:9px;
  font-size:13px;font-family:inherit;outline:none;transition:border .2s;background:#f8fafd;
}
.search-inp:focus{border-color:var(--azul-m);background:#fff}
.filter-sel{
  padding:8px 12px;border:1.5px solid var(--borde);border-radius:9px;
  font-size:13px;font-family:inherit;outline:none;color:var(--texto);
  background:#f8fafd;cursor:pointer;min-width:160px;
}
.filter-sel:focus{border-color:var(--azul-m)}
.btn-add-contact{
  padding:8px 15px;background:linear-gradient(135deg,var(--azul-m),var(--azul));
  color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:700;
  cursor:pointer;white-space:nowrap;transition:opacity .2s;display:flex;align-items:center;gap:6px;
}
.btn-add-contact:hover{opacity:.88}
.btn-export{
  padding:8px 14px;background:var(--blanco);color:var(--azul-m);
  border:1.5px solid var(--borde);border-radius:9px;font-size:13px;font-weight:700;
  cursor:pointer;white-space:nowrap;transition:all .2s;display:flex;align-items:center;gap:6px;
}
.btn-export:hover{border-color:var(--azul-m);background:var(--azul-c)}

/* ── STATS ── */
.stats-bar{display:flex;gap:14px;margin-bottom:1.5rem;flex-wrap:wrap}
.stat-card{
  background:var(--blanco);border:1px solid var(--borde);border-radius:10px;
  padding:.75rem 1.2rem;flex:1;min-width:140px;
  box-shadow:0 2px 6px rgba(10,45,110,.04);
}
.stat-card .num{font-size:24px;font-weight:800;color:var(--azul-m)}
.stat-card .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:1px}

/* ── INSTITUTION GROUP ── */
.inst-group{background:var(--blanco);border:1px solid var(--borde);border-radius:14px;margin-bottom:1.1rem;overflow:hidden;box-shadow:0 2px 8px rgba(10,45,110,.05)}
.inst-group-head{
  display:flex;align-items:center;gap:10px;
  padding:12px 18px;background:linear-gradient(90deg,#f0f5ff,#f8fafd);
  border-bottom:1px solid var(--borde);cursor:pointer;user-select:none;transition:background .15s;
}
.inst-group-head:hover{background:linear-gradient(90deg,#e4ecff,#f0f5ff)}
.inst-name{font-size:14px;font-weight:800;color:var(--azul)}
.inst-count{font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;background:var(--azul-c);color:var(--azul-m);border:1px solid #c0d0f0;margin-left:4px}
.inst-chevron{margin-left:auto;font-size:14px;color:var(--muted);transition:transform .22s}
.inst-chevron.open{transform:rotate(180deg)}
.btn-add-inst{
  margin-left:8px;padding:4px 11px;font-size:12px;font-weight:700;
  background:var(--azul-c);color:var(--azul-m);border:1px solid #c0d0f0;
  border-radius:20px;cursor:pointer;transition:all .15s;white-space:nowrap;
}
.btn-add-inst:hover{background:#d0e4ff}

/* ── CONTACTS TABLE ── */
.contacts-wrap{overflow-x:auto}
.contacts-table{width:100%;border-collapse:collapse;font-size:13px}
.contacts-table th{background:#f8fafd;color:var(--muted);font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:8px 14px;text-align:left;border-bottom:1px solid var(--borde)}
.contacts-table td{padding:10px 14px;border-bottom:1px solid #f0f4fa;vertical-align:middle}
.contacts-table tr:last-child td{border-bottom:none}
.contacts-table tr:hover td{background:#f8fbff}
.contact-name{font-weight:600;color:var(--texto)}
.contact-cargo{font-size:12px;color:var(--muted);margin-top:1px}
.contact-email{color:var(--azul-m);text-decoration:none}
.contact-email:hover{text-decoration:underline}
.source-chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:20px;background:#f0f5ff;color:var(--azul-m);border:1px solid #d0dff8;white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis}
.source-manual{background:#f0fdf4;color:#16a34a;border-color:#bbf7d0}
.btn-del-contact{background:none;border:none;cursor:pointer;color:#94a3b8;font-size:16px;padding:2px 6px;border-radius:6px;transition:color .15s}
.btn-del-contact:hover{color:var(--rojo)}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(10,25,55,.5);z-index:500;display:flex;align-items:center;justify-content:center;padding:1rem;display:none}
.modal-bg.open{display:flex}
.modal-box{background:var(--blanco);border-radius:16px;padding:1.75rem;max-width:480px;width:100%;box-shadow:0 24px 64px rgba(0,0,0,.25)}
.modal-box h3{font-size:16px;font-weight:800;color:var(--azul);margin-bottom:1.25rem}
.mfield{margin-bottom:.9rem}
.mfield label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.mfield input,.mfield select{
  width:100%;padding:9px 12px;border:1.5px solid var(--borde);border-radius:9px;
  font-size:13px;font-family:inherit;outline:none;transition:border .2s;background:#f8fafd;
}
.mfield input:focus,.mfield select:focus{border-color:var(--azul-m);background:#fff}
.tel-wrap{display:flex;gap:6px}
.tel-cc{
  padding:9px 8px;border:1.5px solid var(--borde);border-radius:9px;
  font-size:13px;font-family:inherit;background:#f8fafd;cursor:pointer;
  min-width:108px;flex-shrink:0;outline:none;transition:border .2s;
}
.tel-cc:focus{border-color:var(--azul-m);background:#fff}
.tel-num{
  flex:1;padding:9px 12px;border:1.5px solid var(--borde);border-radius:9px;
  font-size:13px;font-family:inherit;background:#f8fafd;outline:none;transition:border .2s;
}
.tel-num:focus{border-color:var(--azul-m);background:#fff}
.mfield-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-err{font-size:12px;color:var(--rojo);background:#fff5f5;border:1px solid #fecaca;border-radius:8px;padding:7px 11px;margin-bottom:.75rem;display:none}
.modal-foot{display:flex;justify-content:flex-end;gap:10px;margin-top:1.25rem}
.btn-ghost{padding:8px 18px;background:var(--gris);color:var(--muted);border:1px solid var(--borde);border-radius:9px;font-size:13px;font-weight:700;cursor:pointer}
.btn-ghost:hover{background:var(--borde)}
.btnp{padding:9px 22px;background:linear-gradient(135deg,var(--azul-m),var(--azul));color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .2s}
.btnp:hover{opacity:.88}
.btnp:disabled{opacity:.55;cursor:default}

/* ── ESTADOS ── */
.loader{text-align:center;padding:3rem;color:var(--muted)}
.spinner{width:28px;height:28px;border:3px solid var(--borde);border-top-color:var(--azul-m);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:3rem;color:var(--muted);font-size:14px}

@media(max-width:600px){
  .toolbar{gap:8px}
  .search-wrap{max-width:100%;flex:1 1 100%}
  .contacts-table th:nth-child(4),.contacts-table td:nth-child(4){display:none}
  .mfield-row{grid-template-columns:1fr}
}
</style>
</head>

<script>
// ── PHONE HELPERS ─────────────────────────────────────────────────
function telMask(input, baseId) {
  var cc  = document.getElementById(baseId + '-cc');
  var opt = cc.options[cc.selectedIndex];
  var mask   = opt.getAttribute('data-mask');
  var maxLen = parseInt(opt.getAttribute('data-len'));
  var digits = input.value.replace(/\D/g,'').slice(0, maxLen);
  var result = ''; var di = 0;
  for (var i = 0; i < mask.length && di < digits.length; i++) {
    if (mask[i] === 'X') { result += digits[di++]; }
    else if (di > 0)     { result += mask[i]; }
  }
  input.value = result;
}
function telCountryChange(baseId) {
  var cc  = document.getElementById(baseId + '-cc');
  var opt = cc.options[cc.selectedIndex];
  var inp = document.getElementById(baseId + '-num');
  inp.placeholder = opt.getAttribute('data-mask').replace(/X/g,'0');
  inp.value = '';
}
function getTelValue(baseId) {
  var cc = document.getElementById(baseId + '-cc');
  if (!cc) return '';
  var opt  = cc.options[cc.selectedIndex];
  var code = opt.getAttribute('data-code');
  var num  = (document.getElementById(baseId + '-num').value || '').trim();
  return num ? code + ' ' + num : '';
}
// ─────────────────────────────────────────────────────────────────

var SUPABASE_URL = 'https://gnpvqiyantdtksfvqtqk.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImducHZxaXlhbnRkdGtzZnZxdHFrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1ODE5NDIsImV4cCI6MjA5NjE1Nzk0Mn0.u7GxYKoQ_G3gokOg2VarZ707GEGc0dnjjYJNl5n5lDw';
var sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

var todosContactos = [];
var gruposAbiertos = {};
var esAdmin = false;
var instPreselect = ''; // para el botón + por institución

function esc(v){ return String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── NORMALIZACIÓN ────────────────────────────────────────────────
var INST_NORM = {
  'ihadfa':'IHADFA','conscucoop':'CONSUCOOP','consucoop':'CONSUCOOP',
  'instituto de la propiedad':'IP','instituto propiedad':'IP','ip':'IP',
  'canaturh/iht':'CANATURH / IHT','canaturh':'CANATURH / IHT',
  'canaturh / iht':'CANATURH / IHT',
  'banhprovi':'BANHPROVI','cnbs':'CNBS','conatel':'CONATEL',
  'convivienda':'CONVIVIENDA','copeco':'COPECO','ihcine':'IHCINE',
  'ihtt':'IHTT','inprema':'INPREMA','inpreunah':'INPREUNAH',
  'sag':'SAG','secapph':'SECAPPH','sen':'SEN','sgjd':'SGJD',
  'sit':'SIT','sreci':'SRECI','serna':'SERNA'
};
function normInst(val){
  if(!val||val==='—') return '(Sin institución)';
  var v = val.trim();
  if(/^IP\b/i.test(v) && v.length<=20) return 'IP';
  return INST_NORM[v.toLowerCase().replace(/\s+/g,' ')] || v;
}

// ── INIT ─────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', function(){
  var check = setInterval(function(){
    if(window.DIGER_SESSION !== undefined){
      clearInterval(check);
      var s = window.DIGER_SESSION;
      if(!s){ window.location.replace('index.html'); return; }
      esAdmin = s.role === 'admin';
      if(esAdmin) document.getElementById('btn-add-global').style.display = 'flex';
      cargar();
    }
  }, 50);
});

// ── CARGA ─────────────────────────────────────────────────────────
async function cargar(){
  document.getElementById('content').innerHTML =
    '<div class="loader"><div class="spinner"></div>Cargando contactos...</div>';

  // Asistencias de reuniones
  var [resAsis, resManuales, resReuniones] = await Promise.all([
    sb.from('asistencias').select('nombre,correo,cargo,institucion,telefono,reunion_id'),
    sb.from('contactos_manuales').select('*').order('created_at',{ascending:false}),
    sb.from('reuniones').select('id,titulo')
  ]);

  var rmap = {};
  (resReuniones.data||[]).forEach(function(r){ rmap[r.id] = r.titulo; });

  // Deduplicar asistencias por correo (o nombre+inst)
  var seen = {};
  var listaAsis = [];
  (resAsis.data||[]).forEach(function(a){
    var key = (a.correo||'').trim().toLowerCase() ||
              ((a.nombre||'')+'|'+(a.institucion||'')).toLowerCase();
    if(!key||seen[key]) return;
    seen[key] = true;
    listaAsis.push({
      id: null, tipo:'reunion',
      nombre:(a.nombre||'').trim(),
      cargo:(a.cargo||'').trim(),
      correo:(a.correo||'').trim().toLowerCase(),
      telefono:(a.telefono||'').trim(),
      institucion: normInst((a.institucion||'').trim()),
      fuente: rmap[a.reunion_id]||'',
      notas:''
    });
  });

  // Contactos manuales
  var listaManuales = (resManuales.data||[]).map(function(m){
    return {
      id: m.id, tipo:'manual',
      nombre:(m.nombre||'').trim(),
      cargo:(m.cargo||'').trim(),
      correo:(m.correo||'').trim().toLowerCase(),
      telefono:(m.telefono||'').trim(),
      institucion: normInst((m.institucion||'').trim()),
      fuente:'',
      notas:(m.notas||'').trim()
    };
  });

  // Combinar — si mismo correo aparece en ambas, el manual tiene prioridad (tiene id para eliminar)
  var manualEmails = new Set(listaManuales.map(function(m){ return m.correo; }).filter(Boolean));
  var asisNodup = listaAsis.filter(function(a){ return !a.correo || !manualEmails.has(a.correo); });

  todosContactos = listaManuales.concat(asisNodup);
  todosContactos.sort(function(a,b){
    return a.institucion.localeCompare(b.institucion) || a.nombre.localeCompare(b.nombre);
  });

  // Poblar filtro de instituciones
  var insts = [...new Set(todosContactos.map(function(c){ return c.institucion; }))].sort();
  var sel = document.getElementById('filter-inst');
  sel.innerHTML = '<option value="">Todas las instituciones</option>';
  insts.forEach(function(i){
    var opt = document.createElement('option'); opt.value=i; opt.textContent=i; sel.appendChild(opt);
  });

  // Stats
  document.getElementById('stat-total').textContent = todosContactos.length;
  document.getElementById('stat-insts').textContent = insts.length;
  document.getElementById('stat-manuales').textContent = listaManuales.length;
  document.getElementById('stats-bar').style.display = 'flex';

  if(insts.length>0) gruposAbiertos[insts[0]] = true;
  renderContactos(todosContactos);
}

// ── RENDER ────────────────────────────────────────────────────────
function renderContactos(lista){
  var cont = document.getElementById('content');
  if(lista.length===0){
    cont.innerHTML='<div class="empty-state">No se encontraron contactos.</div>'; return;
  }
  var grupos = {};
  lista.forEach(function(c){
    if(!grupos[c.institucion]) grupos[c.institucion]=[];
    grupos[c.institucion].push(c);
  });

  var html='';
  Object.keys(grupos).sort().forEach(function(inst){
    var cs = grupos[inst];
    var abierto = gruposAbiertos[inst]!==false;
    var instId = inst.replace(/[^a-zA-Z0-9]/g,'_');
    html+=
      '<div class="inst-group" id="grp-'+instId+'">'+
        '<div class="inst-group-head" onclick="toggleGrupo(\''+instId+'\')">'+
          '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--azul-m);flex-shrink:0"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>'+
          '<span class="inst-name">'+esc(inst)+'</span>'+
          '<span class="inst-count">'+cs.length+' contacto'+(cs.length!==1?'s':'')+'</span>'+
          (esAdmin?'<button class="btn-add-inst" onclick="event.stopPropagation();abrirModal(\''+esc(inst)+'\')">+ Agregar</button>':'')+
          '<span class="inst-chevron'+(abierto?' open':'')+'">▾</span>'+
        '</div>'+
        '<div id="grp-body-'+instId+'" style="display:'+(abierto?'block':'none')+'">'+
          '<div class="contacts-wrap">'+
            '<table class="contacts-table">'+
              '<thead><tr>'+
                '<th>Nombre / Cargo</th><th>Correo</th><th>Teléfono</th><th>Fuente / Notas</th>'+
                (esAdmin?'<th></th>':'')+
              '</tr></thead>'+
              '<tbody>'+
                cs.map(function(c){
                  var fuenteCell = c.tipo==='manual'
                    ? '<span class="source-chip source-manual">✎ Manual'+(c.notas?' — '+esc(c.notas):'')+'</span>'
                    : (c.fuente?'<span class="source-chip" title="'+esc(c.fuente)+'">'+esc(c.fuente)+'</span>':'<span style="color:var(--muted);font-size:12px">—</span>');
                  var delBtn = (esAdmin&&c.id)
                    ? '<button class="btn-del-contact" title="Eliminar" onclick="eliminarContacto(\''+c.id+'\')">×</button>'
                    : '';
                  return '<tr>'+
                    '<td><div class="contact-name">'+esc(c.nombre||'—')+'</div>'+(c.cargo?'<div class="contact-cargo">'+esc(c.cargo)+'</div>':'')+'</td>'+
                    '<td>'+(c.correo?'<a class="contact-email" href="mailto:'+esc(c.correo)+'">'+esc(c.correo)+'</a>':'<span style="color:var(--muted)">—</span>')+'</td>'+
                    '<td style="color:var(--muted)">'+(c.telefono&&c.telefono!=='—'?esc(c.telefono):'—')+'</td>'+
                    '<td>'+fuenteCell+'</td>'+
                    (esAdmin?'<td>'+delBtn+'</td>':'')+
                  '</tr>';
                }).join('')+
              '</tbody>'+
            '</table>'+
          '</div>'+
        '</div>'+
      '</div>';
  });
  cont.innerHTML = html;
}

// ── FILTROS ───────────────────────────────────────────────────────
function filtrar(){
  var q    = (document.getElementById('search-inp').value||'').toLowerCase().trim();
  var inst = document.getElementById('filter-inst').value;
  var lista = todosContactos.filter(function(c){
    var mi = !inst||c.institucion===inst;
    var mq = !q||c.nombre.toLowerCase().includes(q)||c.correo.toLowerCase().includes(q)||c.cargo.toLowerCase().includes(q);
    return mi&&mq;
  });
  if(q||inst){ var s=new Set(lista.map(function(c){return c.institucion;})); s.forEach(function(i){gruposAbiertos[i]=true;}); }
  renderContactos(lista);
  document.getElementById('stat-total').textContent=lista.length;
}

// ── TOGGLE GRUPO ─────────────────────────────────────────────────
function toggleGrupo(instId){
  var body=document.getElementById('grp-body-'+instId);
  var chev=document.querySelector('#grp-'+instId+' .inst-chevron');
  if(!body) return;
  var abierto=body.style.display!=='none';
  body.style.display=abierto?'none':'block';
  // Reconstruir la clave de institución desde el instId es difícil; usar el estado del DOM
  if(chev) chev.classList.toggle('open',!abierto);
}

// ── MODAL ─────────────────────────────────────────────────────────
function abrirModal(inst){
  instPreselect = inst||'';
  document.getElementById('m-nombre').value='';
  document.getElementById('m-cargo').value='';
  document.getElementById('m-correo').value='';
  document.getElementById('m-tel-num').value='';
  document.getElementById('m-tel-cc').value='HN';
  document.getElementById('m-notas').value='';
  document.getElementById('m-inst').value = instPreselect||'';
  document.getElementById('modal-err').style.display='none';
  document.getElementById('btn-guardar').disabled=false;
  document.getElementById('modal-bg').classList.add('open');
  setTimeout(function(){ document.getElementById('m-nombre').focus(); },80);
}
function cerrarModal(){ document.getElementById('modal-bg').classList.remove('open'); }
function cerrarModalSi(e){ if(e.target===document.getElementById('modal-bg')) cerrarModal(); }

// ── GUARDAR CONTACTO MANUAL ───────────────────────────────────────
async function guardarContacto(){
  var nombre = (document.getElementById('m-nombre').value||'').trim();
  var cargo  = (document.getElementById('m-cargo').value||'').trim();
  var inst   = document.getElementById('m-inst').value;
  var correo = (document.getElementById('m-correo').value||'').trim().toLowerCase();
  var tel    = getTelValue('m-tel');
  var notas  = (document.getElementById('m-notas').value||'').trim();
  var errEl  = document.getElementById('modal-err');
  var btn    = document.getElementById('btn-guardar');
  errEl.style.display='none';

  if(!nombre){ errEl.textContent='El nombre es obligatorio.'; errEl.style.display='block'; return; }
  if(!inst)  { errEl.textContent='Seleccione una institución.'; errEl.style.display='block'; return; }

  btn.disabled=true; btn.textContent='Guardando...';

  var {error} = await sb.from('contactos_manuales').insert({
    nombre, cargo, institucion: inst, correo: correo||null,
    telefono: tel||null, notas: notas||null
  });

  btn.disabled=false; btn.textContent='Guardar';

  if(error){
    errEl.textContent='Error al guardar: '+error.message; errEl.style.display='block'; return;
  }
  cerrarModal();
  cargar(); // recargar todo
}

// ── ELIMINAR CONTACTO MANUAL ──────────────────────────────────────
async function eliminarContacto(id){
  if(!confirm('¿Eliminar este contacto del directorio?')) return;
  await sb.from('contactos_manuales').delete().eq('id',id);
  cargar();
}

// ── EXPORT CSV ────────────────────────────────────────────────────
function exportarCSV(){
  var q    = (document.getElementById('search-inp').value||'').toLowerCase().trim();
  var inst = document.getElementById('filter-inst').value;
  var lista = todosContactos.filter(function(c){
    return (!inst||c.institucion===inst)&&(!q||c.nombre.toLowerCase().includes(q)||c.correo.toLowerCase().includes(q)||c.cargo.toLowerCase().includes(q));
  });
  var rows=[['Institución','Nombre','Cargo','Correo','Teléfono','Fuente','Notas']];
  lista.forEach(function(c){
    rows.push([c.institucion,c.nombre,c.cargo,c.correo,c.telefono,c.tipo==='manual'?'Manual':c.fuente,c.notas]);
  });
  var csv=rows.map(function(r){ return r.map(function(v){ return '"'+String(v||'').replace(/"/g,'""')+'"'; }).join(','); }).join('\r\n');
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'}));
  a.download='directorio_contactos_diger_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}
