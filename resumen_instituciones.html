<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resumen Instituciones — DIGER</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;font-size:14px;color:#1a1a1a;background:#eef1f7;min-height:100vh}

/* HEADER */
.header{background:#fff;padding:16px 2rem;display:flex;align-items:center;box-shadow:0 2px 12px rgba(0,0,0,.08);position:relative;overflow:hidden}
.header::before{content:'';position:absolute;right:0;top:0;bottom:0;width:200px;background:linear-gradient(135deg,transparent 30px,#1455a4 30px)}
.header::after{content:'';position:absolute;right:0;top:0;bottom:0;width:130px;background:linear-gradient(135deg,transparent 30px,#0a2d6e 30px)}
.header img{height:70px;width:auto;position:relative;z-index:1}
.header-title{margin-left:1.5rem;position:relative;z-index:1}
.header-title h1{font-size:16px;font-weight:700;color:#0a2d6e;line-height:1.3}
.header-title p{font-size:12px;color:#6b7fa3;margin-top:2px}

/* CONTAINER */
.container{max-width:960px;margin:0 auto;padding:1.5rem 1.5rem 3rem}

/* SUMMARY CHIPS */
.chips{display:flex;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap}
.chip{background:#fff;border-radius:20px;padding:6px 14px;font-size:12px;font-weight:700;box-shadow:0 1px 6px rgba(10,45,110,.08);display:flex;align-items:center;gap:6px}
.chip-dot{width:10px;height:10px;border-radius:50%}

/* FILTER */
.filterbar{display:flex;gap:.75rem;margin-bottom:1rem;align-items:center;flex-wrap:wrap}
.filterbar input,.filterbar select{padding:8px 12px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:13px;font-family:inherit;background:#fff;color:#1a1a1a;transition:border .2s}
.filterbar input:focus,.filterbar select:focus{outline:none;border-color:#1455a4}
.filterbar input{min-width:220px}
.filter-label{font-size:12px;color:#6b7fa3;font-weight:600}

/* CARDS GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem}

/* INSTITUTION CARD */
.icard{background:#fff;border-radius:14px;box-shadow:0 2px 10px rgba(10,45,110,.07);overflow:hidden;transition:box-shadow .2s,transform .2s;border:1px solid #e8eef8}
.icard:hover{box-shadow:0 6px 24px rgba(10,45,110,.12);transform:translateY(-2px)}
.icard-head{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #f0f4fa}
.icard-name{font-size:14px;font-weight:800;color:#0a2d6e}
.aloj-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:12px;text-transform:uppercase;letter-spacing:.05em}
.aloj-diger{background:#dbeafe;color:#1d4ed8}
.aloj-propia{background:#fef3c7;color:#b45309}
.aloj-propio{background:#f3f4f6;color:#374151}
.icard-body{padding:12px 16px}
.comment-label{font-size:10px;font-weight:700;color:#9aadcc;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.comment-text{font-size:12px;color:#374151;line-height:1.55;white-space:pre-wrap}
.no-comment{font-size:12px;color:#c4cfde;font-style:italic}

/* Highlight dates in comments */
.date-hl{color:#1455a4;font-weight:600}
</style>
</head>
<body>

<div class="header">
  <img src="https://www.diger.gob.hn/wp-content/uploads/2021/05/logo-diger.png" alt="DIGER" onerror="this.style.display='none'">
  <div class="header-title">
    <h1>Resumen de Instituciones</h1>
    <p>PDI · CNI / DIGER &nbsp;·&nbsp; Alojamiento y notas de seguimiento</p>
  </div>
</div>

<div class="container">

  <!-- Chips -->
  <div class="chips">
    <div class="chip"><div class="chip-dot" style="background:#1d4ed8"></div>DIGER <span id="cnt-diger" style="color:#1d4ed8"></span></div>
    <div class="chip"><div class="chip-dot" style="background:#b45309"></div>Propia <span id="cnt-propia" style="color:#b45309"></span></div>
    <div class="chip"><div class="chip-dot" style="background:#374151"></div>Propio <span id="cnt-propio" style="color:#374151"></span></div>
    <div class="chip"><div class="chip-dot" style="background:#9ca3af"></div>Sin definir <span id="cnt-sin" style="color:#9ca3af"></span></div>
    <div class="chip" style="margin-left:auto;background:#f0f4fa"><span style="color:#6b7fa3;font-weight:600" id="cnt-comment-label"></span></div>
  </div>

  <!-- Filter -->
  <div class="filterbar">
    <span class="filter-label">Filtrar:</span>
    <input type="text" id="fSearch" placeholder="Buscar institución o comentario…" oninput="filtrar()">
    <select id="fAloj" onchange="filtrar()">
      <option value="">Todos los alojos</option>
      <option value="DIGER">DIGER</option>
      <option value="PROPIA">Propia</option>
      <option value="PROPIO">Propio</option>
      <option value="">Sin definir</option>
    </select>
    <select id="fComment" onchange="filtrar()">
      <option value="">Todos</option>
      <option value="con">Con comentarios</option>
      <option value="sin">Sin comentarios</option>
    </select>
  </div>

  <div class="grid" id="grid"></div>

</div>

<script>
const data = [
  {inst:"CONVIVIENDA",   aloj:"DIGER",   comment:""},
  {inst:"COPECO",        aloj:"DIGER",   comment:""},
  {inst:"SIT",           aloj:"DIGER",   comment:""},
  {inst:"IHADFA",        aloj:"DIGER",   comment:"05/06/2026 Taller para revisión/capacitación presencial SOL\n* Solicita que se actualicen los videotutoriales para incluir los nuevos logos e identidad institucional actual\n* 12/06/2026 Segundo taller de capacitación al equipo legal e inspectores"},
  {inst:"BANHPROVI",     aloj:"PROPIA",  comment:""},
  {inst:"INPREUNAH",     aloj:"DIGER",   comment:""},
  {inst:"CNBS",          aloj:"PROPIO",  comment:"01/06/2026 El abogado Carlos Mairena menciona que los servicios están \"de baja\", pidió correo para brindar más información"},
  {inst:"INPREMA",       aloj:"DIGER",   comment:""},
  {inst:"IHTT",          aloj:"DIGER",   comment:"03/06/2026 Reporte de incidentes en plataforma, cambio de trámites a nuevos usuarios"},
  {inst:"SEN",           aloj:"DIGER",   comment:""},
  {inst:"CONSUCOOP",     aloj:"DIGER",   comment:"04/06/2026 Reunión de coordinación para migración: verificar disponibilidad de recursos, organizar tareas y definir fechas para sesión de migración.\nReunión programada para 08/06/2026 para migración."},
  {inst:"CONATEL",       aloj:"DIGER",   comment:""},
  {inst:"IHCINE",        aloj:"DIGER",   comment:"03/06/2026 De momento el instituto está suprimido, en espera de directrices para traslado institucional a SECAPPH"},
  {inst:"SAG",           aloj:"DIGER",   comment:""},
  {inst:"SECAPPH",       aloj:"DIGER",   comment:""},
  {inst:"SRECI",         aloj:"Propia",  comment:""},
  {inst:"SERNA",         aloj:"DIGER",   comment:""},
  {inst:"SGJD",          aloj:"DIGER",   comment:""},
  {inst:"CANATURH / IHT",aloj:"DIGER",  comment:""},
  {inst:"IP",            aloj:"PROPIO",  comment:"04/06/2026 Taller de modelado SOL-IP\nSe coordinó una reunión para el 09/06/2026 para continuar con la identificación de potenciales trámites a digitalizar"},
  {inst:"SESAL",         aloj:"",        comment:"A la espera de retroalimentación para continuar con proceso de capacitación/lanzamiento de trámites.\nCoorge reunión con Fernando Valladares del área de proyectos para retomar proceso de digitalización"},
  {inst:"ARSA",          aloj:"PROPIO",  comment:""},
  {inst:"SENASA",        aloj:"DIGER",   comment:""},
  {inst:"BCH",           aloj:"PROPIO",  comment:""},
  {inst:"CNI",           aloj:"",        comment:""},
  {inst:"ICF",           aloj:"",        comment:""},
  {inst:"SEGOB",         aloj:"",        comment:""},
  {inst:"SDE",           aloj:"PROPIO",  comment:""},
  {inst:"PODER JUDICIAL",aloj:"PROPIO",  comment:""},
  {inst:"HBCBH - BOMBEROS",aloj:"DIGER",comment:""},
  {inst:"INFOP",         aloj:"DIGER",   comment:""},
  {inst:"ALCALDÍA COMAYAGUA",aloj:"",   comment:""}
];

function alojBadge(a){
  const u=(a||"").toUpperCase();
  if(u==="DIGER") return `<span class="aloj-badge aloj-diger">DIGER</span>`;
  if(u==="PROPIA"||u==="PROPIA") return `<span class="aloj-badge aloj-propia">Propia</span>`;
  if(u==="PROPIO") return `<span class="aloj-badge aloj-propio">Propio</span>`;
  return `<span class="aloj-badge" style="background:#f1f5f9;color:#9ca3af">Sin definir</span>`;
}

// Highlight date patterns in comments
function highlightDates(text){
  return text.replace(/(\d{2}\/\d{2}\/\d{4})/g,'<span class="date-hl">$1</span>');
}

function cardHtml(r){
  const commentHtml = r.comment
    ? `<div class="comment-label">📝 Notas de seguimiento</div><div class="comment-text">${highlightDates(r.comment.trim())}</div>`
    : `<div class="no-comment">Sin comentarios registrados</div>`;
  return `<div class="icard" data-inst="${r.inst}" data-aloj="${(r.aloj||"").toUpperCase()}" data-comment="${r.comment?"con":"sin"}">
    <div class="icard-head">
      <span class="icard-name">${r.inst}</span>
      ${alojBadge(r.aloj)}
    </div>
    <div class="icard-body">${commentHtml}</div>
  </div>`;
}

function renderCards(rows){
  document.getElementById("grid").innerHTML=rows.map(cardHtml).join("");
}

function filtrar(){
  const q=document.getElementById("fSearch").value.toLowerCase();
  const aloj=document.getElementById("fAloj").value.toUpperCase();
  const cm=document.getElementById("fComment").value;
  const filtered=data.filter(r=>{
    const text=(r.inst+" "+r.comment).toLowerCase();
    const okQ=!q||text.includes(q);
    const okA=!aloj||(r.aloj||"").toUpperCase()===aloj;
    const okC=!cm||(cm==="con"?r.comment.trim()!=="":r.comment.trim()==="");
    return okQ&&okA&&okC;
  });
  renderCards(filtered);
}

// Stats
const cntD=data.filter(r=>(r.aloj||"").toUpperCase()==="DIGER").length;
const cntPrA=data.filter(r=>(r.aloj||"").toUpperCase()==="PROPIA"||r.aloj==="Propia").length;
const cntPrO=data.filter(r=>(r.aloj||"").toUpperCase()==="PROPIO").length;
const cntSin=data.filter(r=>!r.aloj.trim()).length;
const cntCom=data.filter(r=>r.comment.trim()!=="").length;
document.getElementById("cnt-diger").textContent=cntD;
document.getElementById("cnt-propia").textContent=cntPrA;
document.getElementById("cnt-propio").textContent=cntPrO;
document.getElementById("cnt-sin").textContent=cntSin;
document.getElementById("cnt-comment-label").textContent=`${cntCom} con comentarios`;

renderCards(data);
</script>
</body>
</html>
