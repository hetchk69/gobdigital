<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digitalización Comp. 2 — DIGER</title>
<style>
:root{
  --azul:#0a2d6e;--azul-m:#1455a4;--azul-c:#e8f0ff;
  --gris:#eef1f7;--borde:#dde4f0;--texto:#1c2333;--muted:#64748b;
  --verde:#16a34a;--ambar:#d97706;--rojo:#dc2626;--blanco:#fff;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;color:var(--texto);background:var(--gris);min-height:100vh}

/* HEADER */
.header{background:var(--blanco);padding:14px 2rem;display:flex;align-items:center;box-shadow:0 2px 12px rgba(0,0,0,.08);position:relative;overflow:hidden}
.header::before{content:'';position:absolute;right:0;top:0;bottom:0;width:200px;background:linear-gradient(135deg,transparent 30px,#1455a4 30px)}
.header::after{content:'';position:absolute;right:0;top:0;bottom:0;width:130px;background:linear-gradient(135deg,transparent 30px,#0a2d6e 30px)}
.header img{height:60px;width:auto;position:relative;z-index:1}
.header-title{margin-left:1.4rem;position:relative;z-index:1}
.header-title h1{font-size:15px;font-weight:800;color:var(--azul)}
.header-title p{font-size:11px;color:var(--muted);margin-top:2px}

/* CONTAINER */
.wrap{max-width:1100px;margin:0 auto;padding:1.5rem 1.25rem 4rem}

/* GLOBAL STATS */
.stats{display:flex;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap}
.stat{background:var(--blanco);border-radius:12px;padding:.75rem 1.2rem;display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(10,45,110,.07);flex:1;min-width:140px}
.stat-num{font-size:1.9rem;font-weight:800;line-height:1}
.stat.op .stat-num{color:var(--verde)}
.stat.proc .stat-num{color:var(--ambar)}
.stat.ni .stat-num{color:var(--rojo)}
.stat.avg .stat-num{color:var(--azul-m);font-size:1.6rem}
.stat-lbl{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em;line-height:1.3}
.stat-bar{width:100%;height:6px;background:#e2e8f0;border-radius:3px;margin-top:4px;overflow:hidden}
.stat-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--azul-m),var(--verde))}

/* INSTITUTION SELECTOR */
.inst-panel{background:var(--blanco);border-radius:14px;padding:1.25rem 1.5rem;margin-bottom:1.25rem;box-shadow:0 2px 8px rgba(10,45,110,.07)}
.inst-panel-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem}
.panel-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;display:flex;align-items:center;gap:6px}
.search-inst{padding:7px 12px;border:1.5px solid var(--borde);border-radius:9px;font-size:12px;font-family:inherit;outline:none;width:200px;transition:border .2s}
.search-inst:focus{border-color:var(--azul-m)}
.inst-chips{display:flex;flex-wrap:wrap;gap:.5rem}
.chip-inst{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 13px;border-radius:20px;font-size:12px;font-weight:600;
  border:1.5px solid var(--borde);background:var(--blanco);color:var(--muted);
  cursor:pointer;transition:all .18s;white-space:nowrap;
}
.chip-inst:hover{border-color:var(--azul-m);color:var(--azul-m);background:var(--azul-c)}
.chip-inst.active{background:var(--azul-m);border-color:var(--azul-m);color:#fff;box-shadow:0 3px 10px rgba(20,85,164,.25)}
.chip-inst.all{border-color:var(--azul);color:var(--azul)}
.chip-inst.all.active{background:var(--azul);border-color:var(--azul)}
.chip-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.chip-dot.op{background:var(--verde)}
.chip-dot.proc{background:var(--ambar)}
.chip-dot.ni{background:var(--rojo)}

/* SECTION */
.section-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.75rem;padding-bottom:.5rem;border-bottom:2px solid var(--gris);display:flex;align-items:center;justify-content:space-between}
.section-label span{font-size:10px;font-weight:600;color:var(--azul-m);background:var(--azul-c);padding:2px 9px;border-radius:10px}

/* TRAMITE CARD */
.tram-card{background:var(--blanco);border:1.5px solid var(--borde);border-radius:14px;margin-bottom:.9rem;overflow:hidden;box-shadow:0 2px 8px rgba(10,45,110,.06);transition:box-shadow .2s}
.tram-card:hover{box-shadow:0 6px 20px rgba(10,45,110,.11)}
.tram-head{display:flex;align-items:flex-start;gap:12px;padding:1rem 1.25rem;cursor:pointer;user-select:none}
.tram-num{width:28px;height:28px;border-radius:8px;background:var(--azul-c);color:var(--azul-m);font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.tram-info{flex:1;min-width:0}
.tram-name{font-size:13.5px;font-weight:700;color:var(--azul);line-height:1.4;margin-bottom:5px}
.tram-meta{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 9px;border-radius:12px;font-size:11px;font-weight:700}
.badge.op{background:#dcfce7;color:#15803d}
.badge.proc{background:#fef3c7;color:#b45309}
.badge.ni{background:#fee2e2;color:#b91c1c}
.badge.fin{background:#dbeafe;color:#1d4ed8}
.meta-tag{font-size:10px;color:var(--muted);background:var(--gris);padding:2px 7px;border-radius:8px}
.tram-pbar{display:flex;align-items:center;gap:8px;margin-top:8px}
.pbar{flex:1;height:7px;background:#e2e8f0;border-radius:4px;overflow:hidden;max-width:200px}
.pbar-fill{height:100%;border-radius:4px;transition:width .4s}
.pct-lbl{font-size:12px;font-weight:800}
.tram-toggle{font-size:18px;color:var(--muted);flex-shrink:0;transition:transform .25s;padding-top:4px}
.tram-toggle.open{transform:rotate(180deg)}

/* CHECKLIST */
.tram-body{padding:0 1.25rem 1.25rem;border-top:1px solid #f0f4fa;display:none}
.tram-body.open{display:block}
.stages-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.6rem;margin-top:1rem}
.stage-item{display:flex;align-items:flex-start;gap:9px;padding:8px 10px;border:1.5px solid var(--borde);border-radius:10px;cursor:pointer;transition:all .18s;background:#fafbfd}
.stage-item:hover{border-color:var(--azul-m);background:var(--azul-c)}
.stage-item.checked{border-color:var(--verde);background:#f0fdf4}
.stage-cb{width:18px;height:18px;border-radius:5px;border:2px solid var(--borde);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;margin-top:1px;transition:all .18s}
.stage-item.checked .stage-cb{background:var(--verde);border-color:var(--verde);color:#fff}
.stage-text{flex:1}
.stage-num{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.stage-name{font-size:12px;color:var(--texto);line-height:1.3;font-weight:500}
.stage-item.checked .stage-name{color:var(--verde);font-weight:600}
.stage-item.checked .stage-num{color:#86efac}
.stage-peso{font-size:10px;color:var(--muted);margin-top:2px}

/* Extra fields row */
.extra-row{display:flex;gap:1rem;flex-wrap:wrap;margin-top:.85rem;padding-top:.85rem;border-top:1px solid #f0f4fa}
.extra-field{display:flex;flex-direction:column;gap:3px}
.extra-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.extra-sel,.extra-inp{padding:6px 10px;border:1.5px solid var(--borde);border-radius:8px;font-size:12px;font-family:inherit;background:#fafbfd;color:var(--texto);outline:none;transition:border .2s}
.extra-sel:focus,.extra-inp:focus{border-color:var(--azul-m)}
.extra-obs{flex:1;min-width:200px}
.extra-obs textarea{width:100%;min-height:54px;resize:vertical;padding:7px 10px;border:1.5px solid var(--borde);border-radius:8px;font-size:12px;font-family:inherit;background:#fafbfd;outline:none;transition:border .2s}
.extra-obs textarea:focus{border-color:var(--azul-m)}

/* Save indicator */
.save-ind{font-size:11px;color:var(--verde);font-weight:600;display:flex;align-items:center;gap:4px;opacity:0;transition:opacity .4s;margin-top:.6rem}
.save-ind.show{opacity:1}

/* Empty state */
.empty-state{text-align:center;padding:3rem 1rem;color:var(--muted)}
.empty-state .ico{font-size:3rem;margin-bottom:.75rem}
.empty-state p{font-size:14px}

/* Inst header */
.inst-header{display:flex;align-items:center;gap:12px;margin-bottom:1rem}
.inst-icon{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--azul-c),#d5e8ff);display:flex;align-items:center;justify-content:center;font-size:22px}
.inst-name{font-size:18px;font-weight:800;color:var(--azul)}
.inst-sub{font-size:12px;color:var(--muted)}

/* Responsive */
@media(max-width:600px){
  .wrap{padding:1rem .75rem 3rem}
  .stats{gap:.5rem}
  .stat{min-width:120px;padding:.6rem .9rem}
  .stages-grid{grid-template-columns:1fr 1fr}
  .inst-chips{gap:.35rem}
}
</style>
</head>

const LS_KEY = 'diger_comp2_v1';

// ── STORAGE ─────────────────────────────────────────────────────
function loadState() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch { return {}; }
}
function saveState(state) {
  localStorage.setItem(LS_KEY, JSON.stringify(state));
}
function getRecord(id) {
  const state = loadState();
  const def = DEFAULT_DATA.find(d => d.id === id);
  return Object.assign({}, def, state[id] || {});
}
function patchRecord(id, patch) {
  const state = loadState();
  state[id] = Object.assign({}, state[id] || {}, patch);
  saveState(state);
}

// ── HELPERS ──────────────────────────────────────────────────────
function calcPct(etapas) {
  return ETAPAS.reduce((s, e, i) => s + (etapas[i] ? e.peso : 0), 0);
}
function estadoFromPct(pct) {
  if (pct === 0) return 'No iniciado';
  if (pct >= 1)  return 'En operación';
  return 'En proceso';
}
function badgeClass(estado) {
  if (estado === 'En operación') return 'op';
  if (estado === 'No iniciado')  return 'ni';
  return 'proc';
}
function pctColor(pct) {
  if (pct >= 1)   return 'var(--verde)';
  if (pct >= 0.6) return 'var(--ambar)';
  return 'var(--rojo)';
}
function instColor(pct) {
  if (pct >= 1)   return 'op';
  if (pct > 0)    return 'proc';
  return 'ni';
}
function uniqueInsts() {
  return [...new Set(DEFAULT_DATA.map(d => d.inst))];
}

// ── COMPUTE INST SUMMARY ─────────────────────────────────────────
function instSummary(inst) {
  const rows = DEFAULT_DATA.filter(d => d.inst === inst).map(d => getRecord(d.id));
  const avg  = rows.reduce((s, r) => s + calcPct(r.etapas), 0) / rows.length;
  return { avg, count: rows.length };
}

// ── GLOBAL STATS ─────────────────────────────────────────────────
function refreshStats() {
  const all = DEFAULT_DATA.map(d => getRecord(d.id));
  const op   = all.filter(r => calcPct(r.etapas) >= 1).length;
  const ni   = all.filter(r => calcPct(r.etapas) === 0).length;
  const proc = all.length - op - ni;
  const avg  = all.reduce((s, r) => s + calcPct(r.etapas), 0) / all.length;
  document.getElementById('s-op').textContent   = op;
  document.getElementById('s-proc').textContent  = proc;
  document.getElementById('s-ni').textContent    = ni;
  document.getElementById('s-avg').textContent   = Math.round(avg * 100) + '%';
  document.getElementById('s-avgbar').style.width = Math.round(avg * 100) + '%';
}

// ── CHIPS ────────────────────────────────────────────────────────
let activeInst = null;

function buildChips() {
  const wrap = document.getElementById('chips');
  const insts = uniqueInsts();
  wrap.innerHTML =
    `<div class="chip-inst all ${activeInst === null ? 'active' : ''}" onclick="selectInst(null)">🌐 Todas (${insts.length})</div>` +
    insts.map(inst => {
      const s = instSummary(inst);
      const cls = instColor(s.avg);
      const pct = Math.round(s.avg * 100);
      return `<div class="chip-inst ${activeInst === inst ? 'active' : ''}" onclick="selectInst('${inst.replace(/'/g,"\\'")}')">
        <span class="chip-dot ${cls}"></span>${inst} <span style="opacity:.7;font-size:10px">${pct}%</span>
      </div>`;
    }).join('');
}

function filterChips() {
  const q = document.getElementById('searchInst').value.toLowerCase();
  document.querySelectorAll('.chip-inst').forEach(el => {
    el.style.display = (!q || el.textContent.toLowerCase().includes(q)) ? '' : 'none';
  });
}

function selectInst(inst) {
  activeInst = inst;
  buildChips();
  renderContent();
}

// ── RENDER CONTENT ───────────────────────────────────────────────
function renderContent() {
  const content = document.getElementById('content');
  const insts = activeInst ? [activeInst] : uniqueInsts();

  if (!insts.length) {
    content.innerHTML = `<div class="empty-state"><div class="ico">🔍</div><p>No se encontraron resultados.</p></div>`;
    return;
  }

  content.innerHTML = insts.map(inst => renderInst(inst)).join('');
}

function renderInst(inst) {
  const rows = DEFAULT_DATA.filter(d => d.inst === inst).map(d => getRecord(d.id));
  const avg  = rows.reduce((s, r) => s + calcPct(r.etapas), 0) / rows.length;
  const pct  = Math.round(avg * 100);
  const color = pctColor(avg);
  const opCount = rows.filter(r => calcPct(r.etapas) >= 1).length;

  return `<div style="margin-bottom:2rem">
    <div class="inst-header">
      <div class="inst-icon">🏛</div>
      <div>
        <div class="inst-name">${inst}</div>
        <div class="inst-sub">${rows.length} trámite${rows.length !== 1 ? 's' : ''} &nbsp;·&nbsp; ${opCount} en operación &nbsp;·&nbsp;
          <span style="color:${color};font-weight:700">${pct}% avance global</span></div>
      </div>
    </div>
    <div class="section-label">Trámites <span>${rows.length}</span></div>
    ${rows.map(r => renderTramite(r)).join('')}
  </div>`;
}

function renderTramite(r) {
  const pct   = calcPct(r.etapas);
  const pctP  = Math.round(pct * 100);
  const estado = estadoFromPct(pct);
  const bcls  = badgeClass(estado);
  const color = pctColor(pct);

  const stagesHtml = ETAPAS.map((e, i) => {
    const checked = r.etapas[i] ? 'checked' : '';
    return `<div class="stage-item ${checked}" id="si-${r.id}-${i}" onclick="toggleStage(${r.id}, ${i})">
      <div class="stage-cb">${r.etapas[i] ? '✓' : ''}</div>
      <div class="stage-text">
        <div class="stage-num">Etapa ${e.num} &nbsp;·&nbsp; ${Math.round(e.peso*100)}%</div>
        <div class="stage-name">${e.label}</div>
      </div>
    </div>`;
  }).join('');

  const alojOpts = ['DIGER','PROPIA','PROPIO','Propia','Propio',''].map(v =>
    `<option value="${v}" ${r.aloj === v ? 'selected' : ''}>${v || '— No definido —'}</option>`
  ).join('');

  return `<div class="tram-card" id="tc-${r.id}">
    <div class="tram-head" onclick="toggleCard(${r.id})">
      <div class="tram-num">${r.id}</div>
      <div class="tram-info">
        <div class="tram-name">${r.tramite}</div>
        <div class="tram-meta">
          <span class="badge ${bcls}">${estado}</span>
          ${r.financia ? `<span class="meta-tag">Financia: ${r.financia}</span>` : ''}
          <span class="meta-tag">Acta: ${r.acta||'—'}</span>
          <span class="meta-tag">Activo PDI: ${r.activo||'—'}</span>
        </div>
        <div class="tram-pbar">
          <div class="pbar"><div class="pbar-fill" style="width:${pctP}%;background:${color}"></div></div>
          <span class="pct-lbl" style="color:${color}">${pctP}%</span>
        </div>
      </div>
      <div class="tram-toggle" id="tog-${r.id}">▾</div>
    </div>
    <div class="tram-body" id="tb-${r.id}">
      <div class="stages-grid">${stagesHtml}</div>
      <div class="extra-row">
        <div class="extra-field">
          <label class="extra-lbl">Acta firmada</label>
          <select class="extra-sel" onchange="patchField(${r.id},'acta',this.value)">
            <option ${r.acta==='Si'?'selected':''}>Si</option>
            <option ${r.acta==='No'?'selected':''}>No</option>
            <option ${r.acta==='en proceso'?'selected':''}>en proceso</option>
          </select>
        </div>
        <div class="extra-field">
          <label class="extra-lbl">Activo en PDI</label>
          <select class="extra-sel" onchange="patchField(${r.id},'activo',this.value)">
            <option ${r.activo==='Si'?'selected':''}>Si</option>
            <option ${r.activo==='No'?'selected':''}>No</option>
            <option ${r.activo==='en proceso'?'selected':''}>en proceso</option>
          </select>
        </div>
        <div class="extra-field">
          <label class="extra-lbl">Alojamiento</label>
          <select class="extra-sel" onchange="patchField(${r.id},'aloj',this.value)">${alojOpts}</select>
        </div>
        <div class="extra-field">
          <label class="extra-lbl">Func. en PDI</label>
          <input class="extra-inp" value="${r.pdi||''}" placeholder="SI / NO / —" style="width:160px"
            onchange="patchField(${r.id},'pdi',this.value)">
        </div>
        <div class="extra-field extra-obs">
          <label class="extra-lbl">Observaciones</label>
          <textarea onchange="patchField(${r.id},'obs',this.value)" placeholder="Notas adicionales…">${r.obs||''}</textarea>
        </div>
      </div>
      <div class="save-ind" id="saved-${r.id}">✓ Guardado</div>
    </div>
  </div>`;
}

// ── INTERACTIONS ─────────────────────────────────────────────────
function toggleCard(id) {
  const body = document.getElementById('tb-' + id);
  const tog  = document.getElementById('tog-' + id);
  const open = body.classList.toggle('open');
  tog.classList.toggle('open', open);
}

function toggleStage(id, idx) {
  const r = getRecord(id);
  r.etapas[idx] = r.etapas[idx] ? 0 : 1;
  patchRecord(id, { etapas: r.etapas });
  updateTramiteUI(id, r);
  showSaved(id);
  refreshStats();
  buildChips();
}

function patchField(id, field, value) {
  patchRecord(id, { [field]: value });
  showSaved(id);
}

function showSaved(id) {
  const el = document.getElementById('saved-' + id);
  if (!el) return;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2000);
}

function updateTramiteUI(id, r) {
  const pct   = calcPct(r.etapas);
  const pctP  = Math.round(pct * 100);
  const estado = estadoFromPct(pct);
  const bcls  = badgeClass(estado);
  const color = pctColor(pct);

  // Update each stage item
  ETAPAS.forEach((e, i) => {
    const si = document.getElementById(`si-${id}-${i}`);
    if (!si) return;
    si.className = 'stage-item ' + (r.etapas[i] ? 'checked' : '');
    si.querySelector('.stage-cb').textContent = r.etapas[i] ? '✓' : '';
  });

  // Update badge & pbar in header
  const card = document.getElementById('tc-' + id);
  if (!card) return;
  const badge = card.querySelector('.badge');
  badge.className = 'badge ' + bcls;
  badge.textContent = estado;
  const fill = card.querySelector('.pbar-fill');
  if (fill) { fill.style.width = pctP + '%'; fill.style.background = color; }
  const pctLbl = card.querySelector('.pct-lbl');
  if (pctLbl) { pctLbl.textContent = pctP + '%'; pctLbl.style.color = color; }
}

// ── INIT ─────────────────────────────────────────────────────────
refreshStats();
buildChips();
renderContent();
</script>
