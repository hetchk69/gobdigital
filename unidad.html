<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selección de Unidad — DIGER</title>
<style>
:root{
  --azul:#0a2d6e;--azul-m:#1455a4;--azul-c:#e8f0ff;
  --gris:#eef1f7;--borde:#dde4f0;--texto:#1c2333;--muted:#64748b;
  --verde:#16a34a;--rojo:#dc2626;--blanco:#fff;
  --verde-d:#14532d;--morado:#5b21b6;--morado-c:#ede9fe;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;color:var(--texto);background:var(--gris);min-height:100vh}

/* ── CONTAINER ── */
.container{max-width:960px;margin:0 auto;padding:2rem 1rem 3rem}

/* ── WELCOME ── */
.welcome{margin-bottom:2rem}
.welcome h2{font-size:22px;font-weight:800;color:var(--azul);margin-bottom:.25rem}
.welcome p{font-size:13px;color:var(--muted)}
.badge{
  display:inline-flex;align-items:center;gap:6px;
  background:linear-gradient(135deg,var(--azul-c),#d5e8ff);
  color:var(--azul);font-size:11px;font-weight:700;
  padding:4px 12px;border-radius:20px;border:1px solid #c0d0f0;
  margin-bottom:.75rem;
}

/* ── SECTION TITLE ── */
.sec-title{
  font-size:11px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.08em;
  margin-bottom:1.1rem;padding-bottom:.6rem;
  border-bottom:2px solid var(--gris);
  display:flex;align-items:center;gap:6px;
}

/* ── CARD ── */
.card{
  background:var(--blanco);border:1px solid var(--borde);
  border-radius:14px;padding:1.4rem;margin-bottom:1.25rem;
  box-shadow:0 2px 8px rgba(10,45,110,.06);
}

/* ── UNIT CARDS (selector) ── */
.unit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;margin-bottom:1.5rem}
.unit-card{
  background:var(--blanco);border:2px solid var(--borde);
  border-radius:16px;padding:1.75rem 1.5rem;
  text-decoration:none;color:var(--texto);
  transition:all .25s;cursor:pointer;display:flex;flex-direction:column;gap:14px;
}
.unit-card:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(10,45,110,.14)}
.unit-card.proyectos:hover{border-color:#16a34a}
.unit-card.digitalizacion:hover{border-color:var(--azul-m)}
.unit-icon{
  width:56px;height:56px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;font-size:26px;
}
.unit-icon.green{background:linear-gradient(135deg,#d1fae5,#a7f3d0);color:#15803d}
.unit-icon.blue{background:linear-gradient(135deg,var(--azul-c),#d5e8ff);color:var(--azul-m)}
.unit-icon svg,.mod-row-icon svg{display:block}
.unit-name{font-size:17px;font-weight:800;color:var(--azul)}
.unit-desc{font-size:12.5px;color:var(--muted);line-height:1.6}
.unit-arrow{font-size:18px;color:var(--muted);align-self:flex-end}

/* ── MODULE LIST (documento style) ── */
.mod-list{display:flex;flex-direction:column;gap:0}

.mod-row{
  border-bottom:1px solid var(--borde);
  transition:background .15s;
}
.mod-row:last-child{border-bottom:none}
.mod-row-head{
  display:grid;
  grid-template-columns:40px 1fr 110px 1fr 90px;
  align-items:center;gap:12px;
  padding:14px 12px;
  cursor:pointer;
  user-select:none;
  transition:background .15s;
}
.mod-row-head:hover{background:#f5f8ff}
.mod-row-icon{
  width:36px;height:36px;border-radius:9px;
  background:linear-gradient(135deg,var(--azul-c),#d5e8ff);
  display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;
}
.mod-row-name{font-size:14px;font-weight:700;color:var(--azul);line-height:1.3}
.mod-row-name small{display:block;font-size:11px;font-weight:400;color:var(--muted);margin-top:1px}
.mod-type-badge{
  display:inline-flex;align-items:center;
  padding:3px 10px;border-radius:20px;
  font-size:11px;font-weight:700;white-space:nowrap;
  background:var(--azul-c);color:var(--azul-m);
}
.mod-type-badge.registro{background:#dcfce7;color:#15803d}
.mod-type-badge.control{background:#fef3c7;color:#b45309}
.mod-type-badge.levantamiento{background:#ede9fe;color:#5b21b6}
.mod-type-badge.ficha{background:#fee2e2;color:#b91c1c}
.mod-row-desc{font-size:12.5px;color:var(--muted);line-height:1.5}
.mod-row-actions{display:flex;align-items:center;gap:8px;justify-content:flex-end}
.mod-sub-list{border-top:1px solid var(--borde);padding:0 0 4px}
.mod-sub-item{display:grid;grid-template-columns:36px 1fr auto;align-items:center;gap:12px;padding:10px 14px;text-decoration:none;color:inherit;transition:background .13s;border-bottom:1px solid #f0f3fa}
.mod-sub-item:last-child{border-bottom:none}
.mod-sub-item:hover{background:#f5f8ff}
.mod-sub-icon{width:30px;height:30px;border-radius:7px;background:var(--azul-c);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--azul-m)}
.mod-sub-icon svg{width:16px;height:16px}
.mod-sub-name{font-size:13px;font-weight:700;color:var(--azul)}
.mod-sub-desc{font-size:11.5px;color:var(--muted);margin-top:1px}
.btn-open{
  padding:6px 14px;background:linear-gradient(135deg,var(--azul-m),var(--azul));
  color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;
  cursor:pointer;text-decoration:none;display:inline-block;white-space:nowrap;
  transition:opacity .2s;
}
.btn-open:hover{opacity:.85}
.mod-chevron{font-size:13px;color:var(--muted);transition:transform .25s;flex-shrink:0}
.mod-chevron.open{transform:rotate(180deg)}

/* ── INST VERSIONS PANEL ── */
.mod-versions{
  display:none;background:#f8fbff;border-top:1px solid var(--borde);
  padding:12px 14px 14px 52px;
}
.mod-versions.open{display:block}
.versions-label{font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.versions-grid{display:flex;flex-wrap:wrap;gap:7px}
.ver-chip{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 12px;border-radius:20px;
  border:1.5px solid var(--borde);background:var(--blanco);
  font-size:12px;font-weight:600;color:var(--texto);
  text-decoration:none;cursor:pointer;
  transition:all .18s;
}
.ver-chip:hover{border-color:var(--azul-m);background:var(--azul-c);color:var(--azul)}
.ver-chip .dot{width:7px;height:7px;border-radius:50%;background:#c8d5ee;flex-shrink:0}
.ver-chip.activo .dot{background:var(--verde)}

/* ── TABLE HEADER ── */
.list-header{
  display:grid;
  grid-template-columns:40px 1fr 110px 1fr 90px;
  gap:12px;padding:8px 12px;
  background:var(--gris);border-radius:8px;margin-bottom:2px;
}
.list-header span{font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}

/* ── BREADCRUMB ── */
.breadcrumb{
  display:flex;align-items:center;gap:8px;
  font-size:12px;color:var(--muted);margin-bottom:1.5rem;
}
.breadcrumb a{color:var(--azul-m);text-decoration:none;font-weight:600}
.breadcrumb a:hover{text-decoration:underline}
.breadcrumb span{color:var(--muted)}

/* ── ROLE BADGES ── */
.role-badge{display:inline-flex;align-items:center;font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:20px;letter-spacing:.03em}
.role-coordinador{background:#e8f0ff;color:#1455a4;border:1px solid #c0d0f0}
.role-colaborador{background:#e6f7f8;color:#0a7282;border:1px solid #b2e4e8}
.role-lector{background:#f1f5f9;color:#64748b;border:1px solid #dde4f0}
.role-admin{background:#fef3c7;color:#92400e;border:1px solid #fcd34d}
.inst-badge{display:inline-flex;font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px;background:#f5f0ff;color:#6d28d9;border:1px solid #ddd6fe}
/* ── ADMIN PANEL ── */
.access-form{display:flex;gap:8px;margin-bottom:1rem}
.access-inp{
  flex:1;padding:9px 12px;border:1.5px solid var(--borde);border-radius:9px;
  font-size:13px;font-family:inherit;outline:none;transition:border .2s;
}
.access-inp:focus{border-color:var(--azul-m)}
.btn-add{
  padding:9px 18px;background:linear-gradient(135deg,var(--azul-m),var(--azul));
  color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:700;
  cursor:pointer;white-space:nowrap;transition:opacity .2s;
}
.btn-add:hover{opacity:.9}
.access-table{width:100%;border-collapse:collapse;font-size:13px}
.access-table th{
  background:var(--gris);color:var(--muted);
  font-size:10.5px;font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;padding:8px 10px;text-align:left;
}
.access-table td{padding:9px 10px;border-bottom:1px solid #f0f4fa;vertical-align:middle}
.access-table tr:last-child td{border-bottom:none}
.access-table tr:hover td{background:#fafbff}
.email-cell{font-size:13px;color:var(--texto);font-weight:500}

/* ── TOGGLES ── */
.tog{position:relative;display:inline-block;width:38px;height:21px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0}
.tog-sl{position:absolute;inset:0;background:#dde4f0;border-radius:21px;cursor:pointer;transition:.25s}
.tog-sl::before{content:'';position:absolute;left:3px;top:3px;width:15px;height:15px;background:#fff;border-radius:50%;transition:.25s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.tog input:checked+.tog-sl{background:var(--azul-m)}
.tog input:checked+.tog-sl::before{transform:translateX(17px)}
.perm-cell{display:flex;align-items:center;gap:7px}
.perm-lbl{font-size:11.5px;color:var(--muted)}
.btn-rm{
  background:#fff;border:1.5px solid var(--borde);
  color:var(--muted);border-radius:7px;padding:5px 10px;
  font-size:11.5px;cursor:pointer;transition:all .2s;
}
.btn-rm:hover{border-color:var(--rojo);color:var(--rojo);background:#fff5f5}
.empty{padding:1.5rem;text-align:center;color:var(--muted);font-size:13px}
/* ── INSTITUTION PORTAL ── */
.inst-header{background:linear-gradient(135deg,var(--azul),var(--azul-m));color:#fff;border-radius:14px;padding:1.4rem 1.8rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:1rem}
.inst-header-icon{width:52px;height:52px;background:rgba(255,255,255,.18);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.inst-header-icon svg{color:#fff}
.inst-header-name{font-size:22px;font-weight:800;margin-bottom:3px}
.inst-header-sub{font-size:13px;opacity:.82}
.inst-mod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:1.25rem}
.inst-mod-card{background:#fff;border:1.5px solid var(--borde);border-radius:12px;padding:16px 18px;display:flex;align-items:center;gap:14px;text-decoration:none;color:inherit;transition:box-shadow .18s,border-color .18s;cursor:pointer}
.inst-mod-card:hover{border-color:var(--azul-m);box-shadow:0 4px 18px rgba(10,45,110,.11)}
.inst-mod-card-icon{width:40px;height:40px;background:var(--azul-c);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--azul-m)}
.inst-mod-card-name{font-size:13.5px;font-weight:700;color:var(--azul);margin-bottom:2px}
.inst-mod-card-desc{font-size:11.5px;color:var(--muted);line-height:1.4}
.inst-mod-card-arr{margin-left:auto;color:var(--azul-m);font-size:18px;font-weight:300;flex-shrink:0}

/* ── INST CONFIG ROW ── */
.inst-cfg{
  padding:4px 10px 14px 10px;background:#f5f8ff;
}
.inst-cfg-inner{border:1.5px solid #c8d5ee;border-radius:10px;padding:12px}
.inst-cfg-title{font-size:11px;font-weight:700;color:#1455a4;margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em}
.inst-cfg-grid{display:grid;grid-template-columns:2fr 2fr 2fr 1fr;gap:8px}
.inst-lbl{font-size:11px;color:#6b7fa3;display:block;margin-bottom:3px}
.inst-inp{width:100%;padding:6px 8px;border:1.5px solid var(--borde);border-radius:8px;font-size:12px;font-family:inherit}

/* ── TAB TOOLBAR ── */
.tab-toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:1.1rem;flex-wrap:wrap}
.tab-add-form{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.tab-inp{padding:8px 12px;border:1.5px solid var(--borde);border-radius:9px;font-size:13px;font-family:inherit;background:#fff;outline:none;transition:border .2s}
.tab-inp:focus{border-color:var(--azul-m);box-shadow:0 0 0 3px rgba(20,85,164,.1)}
.btn-prim{padding:9px 18px;background:linear-gradient(135deg,var(--azul-m),var(--azul));color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .2s;white-space:nowrap}
.btn-prim:hover{opacity:.88}
.btn-ghost{padding:8px 14px;background:#fff;border:1.5px solid var(--borde);color:var(--muted);border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-ghost:hover{border-color:var(--azul-m);color:var(--azul-m);background:var(--azul-c)}
.tab-empty{text-align:center;padding:3rem 1rem;color:#9aadcc}
.tab-empty .ico{display:flex;justify-content:center;margin-bottom:.85rem;color:#c4cfde}
.tab-empty p{font-size:14px;line-height:1.6}

/* ── CALENDARIO ── */
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.cal-title{font-size:20px;font-weight:800;color:var(--azul)}
.cal-nav{display:flex;gap:6px;align-items:center}
.cal-navbtn{width:34px;height:34px;border-radius:9px;border:1.5px solid var(--borde);background:#fff;color:var(--azul-m);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.cal-navbtn:hover{border-color:var(--azul-m);background:var(--azul-c)}
/* Vista anual — 12 minicalendarios */
.cal-year-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.cal-mini{background:#fff;border:1.5px solid var(--borde);border-radius:12px;padding:12px;transition:box-shadow .2s}
.cal-mini:hover{box-shadow:0 4px 16px rgba(10,45,110,.08)}
.cal-mini-title{font-size:12px;font-weight:800;color:var(--azul);text-align:center;margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em}
.cal-mini-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.cal-mini-dow{text-align:center;font-size:8.5px;font-weight:700;color:var(--muted);padding:3px 0;text-transform:uppercase}
.cal-mini-cell{text-align:center;padding:2px 0;border-radius:5px;cursor:pointer;transition:background .12s;display:flex;flex-direction:column;align-items:center;gap:1px;min-height:22px}
.cal-mini-cell:hover{background:var(--azul-c)}
.cal-mini-cell.empty{cursor:default}
.cal-mini-cell.empty:hover{background:transparent}
.cal-mini-cell.today{background:var(--azul-m);border-radius:5px}
.cal-mini-cell.today .cal-mini-daynum{color:#fff;font-weight:800}
.cal-mini-daynum{font-size:10px;font-weight:600;color:var(--texto);line-height:1.5}
.cal-mini-dots{display:flex;gap:2px;justify-content:center;padding-bottom:1px}
.cal-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0}
/* Lista de eventos del año */
.cal-list{margin-top:1.75rem}
.cal-list-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.75rem;padding-bottom:.5rem;border-bottom:2px solid var(--gris)}
.cal-item{display:flex;align-items:flex-start;gap:12px;padding:11px 13px;background:#fafbfd;border:1px solid var(--borde);border-radius:10px;margin-bottom:7px}
.cal-item-date{width:48px;flex-shrink:0;text-align:center;background:linear-gradient(135deg,var(--azul-m),var(--azul));color:#fff;border-radius:9px;padding:5px 0}
.cal-item-day{font-size:18px;font-weight:800;line-height:1}
.cal-item-mon{font-size:9px;text-transform:uppercase;letter-spacing:.05em;margin-top:1px}
.cal-item-body{flex:1;min-width:0}
.cal-item-name{font-size:14px;font-weight:700;color:var(--azul)}
.cal-item-meta{font-size:12px;color:var(--muted);margin-top:2px}
.cal-item-del{background:none;border:none;color:#c4cfde;font-size:15px;cursor:pointer;padding:2px 6px;border-radius:6px;flex-shrink:0;transition:color .2s}
.cal-item-del:hover{color:var(--rojo)}

/* ── DOC / REPO LIST ── */
.dr-item{display:flex;align-items:center;gap:13px;padding:13px 15px;background:#fff;border:1.5px solid var(--borde);border-radius:12px;margin-bottom:9px;box-shadow:0 2px 8px rgba(10,45,110,.05);transition:all .2s}
.dr-item:hover{border-color:var(--azul-m);box-shadow:0 5px 16px rgba(10,45,110,.1)}
.dr-ico{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--azul-c),#d5e8ff);color:var(--azul-m);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dr-info{flex:1;min-width:0}
.dr-name{font-size:14px;font-weight:700;color:var(--azul)}
.dr-meta{font-size:12px;color:var(--muted);margin-top:2px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.dr-badge{display:inline-flex;padding:2px 9px;border-radius:11px;font-size:10.5px;font-weight:700;background:var(--azul-c);color:var(--azul-m)}
.dr-acts{display:flex;gap:6px;flex-shrink:0;align-items:center}
.dr-open{padding:6px 13px;background:var(--azul-m);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none;white-space:nowrap}
.dr-open:hover{opacity:.88}
.dr-del{padding:6px 10px;background:#fff;border:1.5px solid var(--borde);color:var(--muted);border-radius:8px;font-size:13px;cursor:pointer;transition:all .2s}
.dr-del:hover{border-color:var(--rojo);color:var(--rojo)}
.repo-cat{font-size:12px;font-weight:800;color:var(--azul);text-transform:uppercase;letter-spacing:.05em;margin:1.4rem 0 .75rem;display:flex;align-items:center;gap:8px}
.repo-cat:first-child{margin-top:0}
.repo-cat::after{content:'';flex:1;height:1px;background:var(--borde)}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(10,25,55,.5);display:none;align-items:center;justify-content:center;z-index:200;padding:1rem}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:16px;max-width:440px;width:100%;box-shadow:0 24px 64px rgba(0,0,0,.3);overflow:hidden;animation:mpop .25s ease}
@keyframes mpop{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}
.modal-head{background:linear-gradient(135deg,var(--azul-m),var(--azul));color:#fff;padding:1rem 1.4rem;font-size:15px;font-weight:800;display:flex;align-items:center;justify-content:space-between}
.modal-x{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;opacity:.8;line-height:1}
.modal-x:hover{opacity:1}
.modal-body{padding:1.4rem}
.modal-field{margin-bottom:1rem}
.modal-field label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.modal-field input,.modal-field textarea,.modal-field select{width:100%;padding:9px 12px;border:1.5px solid var(--borde);border-radius:9px;font-size:13.5px;font-family:inherit;background:#fafbfd;outline:none;transition:border .2s}
.modal-field input:focus,.modal-field textarea:focus,.modal-field select:focus{border-color:var(--azul-m);background:#fff;box-shadow:0 0 0 3px rgba(20,85,164,.09)}
.modal-field textarea{min-height:70px;resize:vertical}
.modal-foot{display:flex;gap:9px;justify-content:flex-end;margin-top:1.3rem}

/* ── TABLET ── */
@media(max-width:900px){
  .cal-year-grid{grid-template-columns:repeat(3,1fr)}
}
/* ── MOBILE ── */
@media(max-width:600px){
  .container{padding:1rem .75rem 2rem}
  .card{padding:1.1rem;border-radius:11px}
  .unit-grid{grid-template-columns:1fr}
  .mod-grid{grid-template-columns:1fr}
  .access-form{flex-direction:column}
  .access-table{font-size:12px}
  .inst-cfg-grid{grid-template-columns:1fr 1fr}
  .cal-year-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .cal-mini{padding:9px}

// ════════════════════════════════════════════════════════════════
function calKey(unitKey) { return 'diger_cal_' + unitKey; }
function calEvents(unitKey) { return lsGet(calKey(unitKey), []); }

function renderCalendario(unitKey) {
  CURRENT_UNIT = unitKey;
  var u = UNITS[unitKey];
  var y = calState.y;
  var hoy = new Date();
  var events = calEvents(unitKey);

  // Mapa fecha -> eventos
  var byDate = {};
  events.forEach(function(ev){ (byDate[ev.fecha] = byDate[ev.fecha] || []).push(ev); });

  var DOT_COLORS = ['#1455a4','#16a34a','#d97706','#dc2626','#7c3aed'];

  // Construir los 12 minicalendarios
  var monthsHtml = '';
  for (var mi = 0; mi < 12; mi++) {
    var first = new Date(y, mi, 1);
    var startDow = (first.getDay() + 6) % 7; // lunes=0
    var daysInMonth = new Date(y, mi+1, 0).getDate();

    var miniGrid = ['L','M','X','J','V','S','D']
      .map(function(d){ return '<div class="cal-mini-dow">' + d + '</div>'; }).join('');

    for (var i = 0; i < startDow; i++) miniGrid += '<div class="cal-mini-cell empty"></div>';

    for (var d = 1; d <= daysInMonth; d++) {
      var fecha = y + '-' + String(mi+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
      var isToday = (y === hoy.getFullYear() && mi === hoy.getMonth() && d === hoy.getDate());
      var evs = byDate[fecha] || [];
      var tooltip = evs.length
        ? evs.map(function(e){ return e.titulo; }).join(', ')
        : 'Agregar evento';
      var dots = evs.slice(0, 4).map(function(_, k){
        return '<span class="cal-dot" style="background:' + DOT_COLORS[k % DOT_COLORS.length] + '"></span>';
      }).join('');
      miniGrid +=
        '<div class="cal-mini-cell' + (isToday ? ' today' : '') + '"' +
        ' onclick="calAddPrompt(\'' + fecha + '\')"' +
        ' title="' + esc(tooltip) + '">' +
          '<span class="cal-mini-daynum">' + d + '</span>' +
          (dots ? '<div class="cal-mini-dots">' + dots + '</div>' : '') +
        '</div>';
    }

    var mesNombre = MESES[mi].charAt(0).toUpperCase() + MESES[mi].slice(1);
    monthsHtml +=
      '<div class="cal-mini">' +
        '<div class="cal-mini-title">' + mesNombre + '</div>' +
        '<div class="cal-mini-grid">' + miniGrid + '</div>' +
      '</div>';
  }

  // Lista de todos los eventos del año, ordenados por fecha
  var yearEvents = events
    .filter(function(ev){ return ev.fecha && ev.fecha.slice(0,4) === String(y); })
    .sort(function(a,b){ return a.fecha.localeCompare(b.fecha) || (a.hora||'').localeCompare(b.hora||''); });

  var listHtml = '';
  if (yearEvents.length) {
    listHtml = '<div class="cal-list">' +
      '<div class="cal-list-title">Eventos ' + y + ' &nbsp;(' + yearEvents.length + ')</div>' +
      yearEvents.map(function(ev){
        var p = ev.fecha.split('-'), mm = +p[1]-1;
        return '<div class="cal-item">' +
          '<div class="cal-item-date">' +
            '<div class="cal-item-day">' + (+p[2]) + '</div>' +
            '<div class="cal-item-mon">' + MESES_C[mm] + '</div>' +
          '</div>' +
          '<div class="cal-item-body">' +
            '<div class="cal-item-name">' + esc(ev.titulo) + '</div>' +
            '<div class="cal-item-meta">' +
              (ev.hora ? '🕒 ' + esc(ev.hora) + ' · ' : '') +
              (ev.desc ? esc(ev.desc) : 'Sin descripción') +
            '</div>' +
          '</div>' +
          '<button class="cal-item-del" onclick="calDelEvent(\'' + ev.id + '\')" title="Eliminar">✕</button>' +
        '</div>';
      }).join('') +
    '</div>';
  }

  app.innerHTML =
    tabBreadcrumb(unitKey, 'Calendario') +
    '<div class="welcome"><div class="badge">' + esc(u.label) + '</div>' +
      '<h2>Calendario</h2><p>Eventos, reuniones y fechas clave de la unidad.</p></div>' +
    '<div class="card">' +
      '<div class="cal-head">' +
        '<div class="cal-title">' + y + '</div>' +
        '<div class="cal-nav">' +
          '<button class="btn-ghost" onclick="calToday()">Hoy</button>' +
          '<button class="cal-navbtn" onclick="calPrev()">‹</button>' +

          '<button class="btn-prim" onclick="calAddPrompt()">+ Evento</button>' +
        '</div>' +
      '</div>' +
      '<div class="cal-year-grid">' + monthsHtml + '</div>' +
      listHtml +
    '</div>';

function calPrev() { calState.y--; renderCalendario(CURRENT_UNIT); }
function calNext() { calState.y++; renderCalendario(CURRENT_UNIT); }
function calToday() { calState.y = new Date().getFullYear(); renderCalendario(CURRENT_UNIT); }

function calAddPrompt(fecha) {
  var def = fecha || (calState.y + '-' + String(new Date().getMonth()+1).padStart(2,'0') + '-' + String(new Date().getDate()).padStart(2,'0'));
  abrirModal('Nuevo evento',
    '<div class="modal-field"><label>Título *</label><input type="text" id="ev-titulo" placeholder="Ej: Reunión de coordinación SOL"></div>' +
    '<div class="modal-field"><label>Fecha *</label><input type="date" id="ev-fecha" value="' + def + '"></div>' +
    '<div class="modal-field"><label>Hora</label><input type="time" id="ev-hora"></div>' +

    '<div class="modal-foot"><button class="btn-ghost" onclick="cerrarModal()">Cancelar</button>' +
    '<button class="btn-prim" onclick="calSaveEvent()">Guardar evento</button></div>');

function calSaveEvent() {
  var titulo = document.getElementById('ev-titulo').value.trim();
  var fecha  = document.getElementById('ev-fecha').value;
  var hora   = document.getElementById('ev-hora').value;
  var desc   = document.getElementById('ev-desc').value.trim();
  if (!titulo) { alert('Ingrese el título del evento.'); return; }
  if (!fecha)  { alert('Seleccione una fecha.'); return; }
  var evs = calEvents(CURRENT_UNIT);
  evs.push({ id: uid(), titulo: titulo, fecha: fecha, hora: hora, desc: desc });
  lsSet(calKey(CURRENT_UNIT), evs);
  cerrarModal();
  var p = fecha.split('-'); calState.y = +p[0]; calState.m = +p[1]-1;
  renderCalendario(CURRENT_UNIT);
}

function calDelEvent(id) {
  if (!confirm('¿Eliminar este evento?')) return;
  var evs = calEvents(CURRENT_UNIT).filter(function(e){ return e.id !== id; });
  lsSet(calKey(CURRENT_UNIT), evs);
  renderCalendario(CURRENT_UNIT);
}

async function guardarNuevoUsuario() {
  var email = (document.getElementById('nu-email').value||'').trim().toLowerCase();
  var rol   = document.getElementById('nu-rol').value;
  var inst  = document.getElementById('nu-inst').value;
  var err   = document.getElementById('nu-err');
  err.style.display = 'none';
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { err.textContent='Ingrese un correo válido.'; err.style.display='block'; return; }
  if (!inst) { err.textContent='Seleccione una institución.'; err.style.display='block'; return; }
  if (getDomain(email) === 'diger.gob.hn') { err.textContent='Los correos @diger.gob.hn son administradores.'; err.style.display='block'; return; }
  // Verificar si ya existe
  var { data: existe } = await sb.from('usuarios_sol').select('email').eq('email', email).single();
  if (existe) { err.textContent='Este correo ya está registrado.'; err.style.display='block'; return; }
  var { error } = await upsertUser(email, rol, inst);
  if (error) { err.textContent='Error al guardar. Intente de nuevo.'; err.style.display='block'; return; }
  cerrarModal();
  renderTablaAccesos();
}

async function renderTablaAccesos() {
  var tbody = document.getElementById('access-tbody');
  var empty = document.getElementById('access-empty');
  if (!tbody) return;
  tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:1rem">Cargando...</td></tr>';
  var cfg = await loadConfig();
  var emails = Object.keys(cfg).sort(function(a,b){
    var ra=ROL_ORDER.indexOf(cfg[a].role||'colaborador'), rb=ROL_ORDER.indexOf(cfg[b].role||'colaborador');
    return ra-rb || a.localeCompare(b);
  });
  tbody.innerHTML = '';
  if (emails.length === 0) { empty.style.display='block'; return; }
  empty.style.display = 'none';
  emails.forEach(function(email) {
    var u   = cfg[email];
    var rol = u.role || 'colaborador';
    var inst= u.institucion || '—';
    var tr  = document.createElement('tr');
    tr.innerHTML =
      '<td class="email-cell">'+esc(email)+'</td>'+
      '<td><span class="role-badge role-'+rol+'">'+esc(ROL_LABELS[rol]||rol)+'</span></td>'+
      '<td><span class="inst-badge">'+esc(inst)+'</span></td>'+
      '<td><span style="font-size:11px;color:var(--muted)">Estado Institucional · Reuniones cerradas</span></td>'+
      '<td><button class="btn-rm" onclick="eliminarFuncionario(\''+email+'\')">Eliminar</button></td>';
    tbody.appendChild(tr);
  });
}

async function eliminarFuncionario(email) {
  if (!confirm('¿Eliminar el acceso de ' + email + '?')) return;
  await deleteUser(email);
  renderTablaAccesos();
}

  if (!ses) { window.location.replace('index.html'); return; }
  var inst = ses.institucion || '';
  var rol  = ses.role || 'colaborador';
  var acc  = ses.access || {};
  document.title = esc(inst) + ' — DIGER SOL';

  // Módulos automáticos para todos los usuarios institucionales
  var AUTO_KEYS = ['levantamiento_reunion'];
  var accMods = ALL_MODULOS.filter(function(m){ return AUTO_KEYS.indexOf(m.key) !== -1; });

  // Documentos fijos disponibles en el portal institucional
  var docsInst = (UNITS.digitalizacion.documentosFijos || []);

  var INST_SVG = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>';

  var html =
    '<div class="inst-header">' +
      '<div class="inst-header-icon">' + INST_SVG + '</div>' +
      '<div>' +
        '<div class="inst-header-name">' + esc(inst||'Portal Institucional') + '</div>' +
        '<div class="inst-header-sub">' +
          '<span class="role-badge role-'+rol+'" style="background:rgba(255,255,255,.2);color:#fff;border-color:rgba(255,255,255,.3)">'+esc(ROL_LABELS[rol]||rol)+'</span>' +
          '&nbsp; DIGER — Gobierno Digital Honduras' +
        '</div>' +
      '</div>' +
    '</div>';

  // Módulos (levantamiento de reunión, etc.)
  if (accMods.length > 0) {
    html += '<div class="sec-title" style="margin-top:1.5rem">Módulos</div>';
    html += '<div class="inst-mod-grid">';
    accMods.forEach(function(m) {
      if(m.subItems) {
        // Render group header + sub-items as individual cards
        html += '<div class="inst-mod-card" style="flex-direction:column;align-items:flex-start;gap:0;padding:0;overflow:hidden;cursor:default">' +
          '<div style="display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--borde);width:100%;box-sizing:border-box">' +
            '<div class="inst-mod-card-icon">' + (SVGS[m.icon]||'') + '</div>' +
            '<div><div class="inst-mod-card-name">' + esc(m.label) + '</div><div class="inst-mod-card-desc">' + esc(m.desc) + '</div></div>' +
          '</div>';
        m.subItems.forEach(function(si){
          var siUrl = si.url + (inst ? '?inst=' + encodeURIComponent(inst) : '');
          html += '<a class="mod-sub-item" href="' + siUrl + '" style="padding:9px 14px;border-radius:0">' +
            '<div class="mod-sub-icon">' + (SVGS[si.icon]||'') + '</div>' +
            '<div><div class="mod-sub-name">' + esc(si.label) + '</div><div class="mod-sub-desc">' + esc(si.desc) + '</div></div>' +
            '<span class="btn-open" style="font-size:11px;padding:4px 10px">Abrir →</span>' +
          '</a>';
        });
        html += '</div>';
      } else {
        var url = m.url + (inst ? '?inst=' + encodeURIComponent(inst) : '');
        html +=
          '<a class="inst-mod-card" href="' + url + '">' +
            '<div class="inst-mod-card-icon">' + (SVGS[m.icon]||'') + '</div>' +
            '<div style="min-width:0">' +
              '<div class="inst-mod-card-name">' + esc(m.label) + '</div>' +
              '<div class="inst-mod-card-desc">' + esc(m.desc) + '</div>' +
            '</div>' +
            '<div class="inst-mod-card-arr">›</div>' +
          '</a>';
      }
    });
    html += '</div>';
  }

  // Documentos del sistema accesibles por la institución
  if (docsInst.length > 0) {
    html += '<div class="sec-title" style="margin-top:1.5rem">Documentos</div>';
    html += '<div class="inst-mod-grid">';
    docsInst.forEach(function(d) {
      var url = d.url + (inst ? '?inst=' + encodeURIComponent(inst) : '');
      html +=
        '<a class="inst-mod-card" href="' + url + '">' +
          '<div class="inst-mod-card-icon">' + (SVGS[d.icon]||DOC_ICO) + '</div>' +
          '<div style="min-width:0">' +
            '<div class="inst-mod-card-name">' + esc(d.nombre) + '</div>' +
            '<div class="inst-mod-card-desc">' + esc(d.desc) + '</div>' +
          '</div>' +
          '<div class="inst-mod-card-arr">›</div>' +
        '</a>';
    });
    html += '</div>';
  }

  if (accMods.length === 0 && docsInst.length === 0) {
    html += '<div class="card"><div class="empty" style="padding:2.5rem">Sin módulos habilitados. Contacte al administrador DIGER.</div></div>';
  }

  // Coordinator sub-user panel
  if (rol === 'coordinador') {
    html +=
      '<div class="card" id="coord-panel">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">' +
          '<div class="sec-title" style="margin:0;border:none;padding:0">Usuarios de ' + esc(inst) + '</div>' +
          '<button class="btn-add" onclick="abrirModalSubusuario()">+ Agregar usuario</button>' +
        '</div>' +
        '<div id="coord-table-wrap">' +
          '<table class="access-table">' +
            '<thead><tr><th>Correo</th><th>Rol</th><th></th></tr></thead>' +
            '<tbody id="coord-tbody"></tbody>' +
          '</table>' +
          '<div class="empty" id="coord-empty">No hay usuarios registrados para esta institución.</div>' +
        '</div>' +
      '</div>';
  }

  app.innerHTML = html;
  if (rol === 'coordinador') renderTablaCoord();
}
</script>
</body>
</html>
