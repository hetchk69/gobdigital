<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selección de Unidad — DIGER</title>
<style>
:root{
  --azul:#0a2d6e;--azul-m:#1455a4;--azul-c:#e8f0ff;
  --gris:#eef1f7;--borde:#dde4f0;--texto:#1c2333;--muted:#64748b;
  --verde:#16a34a;--rojo:#dc2626;--blanco:#fff;
  --verde-d:#14532d;--morado:#5b21b6;--morado-c:#ede9fe;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;color:var(--texto);background:var(--gris);min-height:100vh}

/* ── CONTAINER ── */
.container{max-width:960px;margin:0 auto;padding:2rem 1rem 3rem}

/* ── WELCOME ── */
.welcome{margin-bottom:2rem}
.welcome h2{font-size:22px;font-weight:800;color:var(--azul);margin-bottom:.25rem}
.welcome p{font-size:13px;color:var(--muted)}
.badge{
  display:inline-flex;align-items:center;gap:6px;
  background:linear-gradient(135deg,var(--azul-c),#d5e8ff);
  color:var(--azul);font-size:11px;font-weight:700;
  padding:4px 12px;border-radius:20px;border:1px solid #c0d0f0;
  margin-bottom:.75rem;
}

/* ── SECTION TITLE ── */
.sec-title{
  font-size:11px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.08em;
  margin-bottom:1.1rem;padding-bottom:.6rem;
  border-bottom:2px solid var(--gris);
  display:flex;align-items:center;gap:6px;
}

/* ── CARD ── */
.card{
  background:var(--blanco);border:1px solid var(--borde);
  border-radius:14px;padding:1.4rem;margin-bottom:1.25rem;
  box-shadow:0 2px 8px rgba(10,45,110,.06);
}

/* ── UNIT CARDS (selector) ── */
.unit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;margin-bottom:1.5rem}
.unit-card{
  background:var(--blanco);border:2px solid var(--borde);
  border-radius:16px;padding:1.75rem 1.5rem;
  text-decoration:none;color:var(--texto);
  transition:all .25s;cursor:pointer;display:flex;flex-direction:column;gap:14px;
}
.unit-card:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(10,45,110,.14)}
.unit-card.proyectos:hover{border-color:#16a34a}
.unit-card.digitalizacion:hover{border-color:var(--azul-m)}
.unit-icon{
  width:56px;height:56px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;font-size:26px;
}
.unit-icon.green{background:linear-gradient(135deg,#d1fae5,#a7f3d0);color:#15803d}
.unit-icon.blue{background:linear-gradient(135deg,var(--azul-c),#d5e8ff);color:var(--azul-m)}
.unit-icon svg,.mod-row-icon svg{display:block}
.unit-name{font-size:17px;font-weight:800;color:var(--azul)}
.unit-desc{font-size:12.5px;color:var(--muted);line-height:1.6}
.unit-arrow{font-size:18px;color:var(--muted);align-self:flex-end}

/* ── MODULE LIST (documento style) ── */
.mod-list{display:flex;flex-direction:column;gap:0}

.mod-row{
  border-bottom:1px solid var(--borde);
  transition:background .15s;
}
.mod-row:last-child{border-bottom:none}
.mod-row-head{
  display:grid;
  grid-template-columns:40px 1fr 110px 1fr 90px;
  align-items:center;gap:12px;
  padding:14px 12px;
  cursor:pointer;
  user-select:none;
  transition:background .15s;
}
.mod-row-head:hover{background:#f5f8ff}
.mod-row-icon{
  width:36px;height:36px;border-radius:9px;
  background:linear-gradient(135deg,var(--azul-c),#d5e8ff);
  display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;
}
.mod-row-name{font-size:14px;font-weight:700;color:var(--azul);line-height:1.3}
.mod-row-name small{display:block;font-size:11px;font-weight:400;color:var(--muted);margin-top:1px}
.mod-type-badge{
  display:inline-flex;align-items:center;
  padding:3px 10px;border-radius:20px;
  font-size:11px;font-weight:700;white-space:nowrap;
  background:var(--azul-c);color:var(--azul-m);
}
.mod-type-badge.registro{background:#dcfce7;color:#15803d}
.mod-type-badge.control{background:#fef3c7;color:#b45309}
.mod-type-badge.levantamiento{background:#ede9fe;color:#5b21b6}
.mod-type-badge.ficha{background:#fee2e2;color:#b91c1c}
.mod-row-desc{font-size:12.5px;color:var(--muted);line-height:1.5}
.mod-row-actions{display:flex;align-items:center;gap:8px;justify-content:flex-end}
.mod-sub-list{border-top:1px solid var(--borde);padding:0 0 4px}
.mod-sub-item{display:grid;grid-template-columns:36px 1fr auto;align-items:center;gap:12px;padding:10px 14px;text-decoration:none;color:inherit;transition:background .13s;border-bottom:1px solid #f0f3fa}
.mod-sub-item:last-child{border-bottom:none}
.mod-sub-item:hover{background:#f5f8ff}
.mod-sub-icon{width:30px;height:30px;border-radius:7px;background:var(--azul-c);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--azul-m)}
.mod-sub-icon svg{width:16px;height:16px}
.mod-sub-name{font-size:13px;font-weight:700;color:var(--azul)}
.mod-sub-desc{font-size:11.5px;color:var(--muted);margin-top:1px}
.btn-open{
  padding:6px 14px;background:linear-gradient(135deg,var(--azul-m),var(--azul));
  color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;
  cursor:pointer;text-decoration:none;display:inline-block;white-space:nowrap;
  transition:opacity .2s;
}
.btn-open:hover{opacity:.85}
.mod-chevron{font-size:13px;color:var(--muted);transition:transform .25s;flex-shrink:0}
.mod-chevron.open{transform:rotate(180deg)}

/* ── INST VERSIONS PANEL ── */
.mod-versions{
  display:none;background:#f8fbff;border-top:1px solid var(--borde);
  padding:12px 14px 14px 52px;
}
.mod-versions.open{display:block}
.versions-label{font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.versions-grid{display:flex;flex-wrap:wrap;gap:7px}
.ver-chip{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 12px;border-radius:20px;
  border:1.5px solid var(--borde);background:var(--blanco);
  font-size:12px;font-weight:600;color:var(--texto);
  text-decoration:none;cursor:pointer;
  transition:all .18s;
}
.ver-chip:hover{border-color:var(--azul-m);background:var(--azul-c);color:var(--azul)}
.ver-chip .dot{width:7px;height:7px;border-radius:50%;background:#c8d5ee;flex-shrink:0}
.ver-chip.activo .dot{background:var(--verde)}

/* ── TABLE HEADER ── */
.list-header{
  display:grid;
  grid-template-columns:40px 1fr 110px 1fr 90px;
  gap:12px;padding:8px 12px;
  background:var(--gris);border-radius:8px;margin-bottom:2px;
}
.list-header span{font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}

/* ── BREADCRUMB ── */
.breadcrumb{
  display:flex;align-items:center;gap:8px;
  font-size:12px;color:var(--muted);margin-bottom:1.5rem;
}
.breadcrumb a{color:var(--azul-m);text-decoration:none;font-weight:600}
.breadcrumb a:hover{text-decoration:underline}
.breadcrumb span{color:var(--muted)}

/* ── ROLE BADGES ── */
.role-badge{display:inline-flex;align-items:center;font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:20px;letter-spacing:.03em}
.role-coordinador{background:#e8f0ff;color:#1455a4;border:1px solid #c0d0f0}
.role-colaborador{background:#e6f7f8;color:#0a7282;border:1px solid #b2e4e8}
.role-lector{background:#f1f5f9;color:#64748b;border:1px solid #dde4f0}
.role-admin{background:#fef3c7;color:#92400e;border:1px solid #fcd34d}
.inst-badge{display:inline-flex;font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px;background:#f5f0ff;color:#6d28d9;border:1px solid #ddd6fe}
/* ── ADMIN PANEL ── */
.access-form{display:flex;gap:8px;margin-bottom:1rem}
.access-inp{
  flex:1;padding:9px 12px;border:1.5px solid var(--borde);border-radius:9px;
  font-size:13px;font-family:inherit;outline:none;transition:border .2s;
}
.access-inp:focus{border-color:var(--azul-m)}
.btn-add{
  padding:9px 18px;background:linear-gradient(135deg,var(--azul-m),var(--azul));
  color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:700;
  cursor:pointer;white-space:nowrap;transition:opacity .2s;
}
.btn-add:hover{opacity:.9}
.access-table{width:100%;border-collapse:collapse;font-size:13px}
.access-table th{
  background:var(--gris);color:var(--muted);
  font-size:10.5px;font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;padding:8px 10px;text-align:left;
}
.access-table td{padding:9px 10px;border-bottom:1px solid #f0f4fa;vertical-align:middle}
.access-table tr:last-child td{border-bottom:none}
.access-table tr:hover td{background:#fafbff}
.email-cell{font-size:13px;color:var(--texto);font-weight:500}

/* ── TOGGLES ── */
.tog{position:relative;display:inline-block;width:38px;height:21px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0}
.tog-sl{position:absolute;inset:0;background:#dde4f0;border-radius:21px;cursor:pointer;transition:.25s}
.tog-sl::before{content:'';position:absolute;left:3px;top:3px;width:15px;height:15px;background:#fff;border-radius:50%;transition:.25s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.tog input:checked+.tog-sl{background:var(--azul-m)}
.tog input:checked+.tog-sl::before{transform:translateX(17px)}
.perm-cell{display:flex;align-items:center;gap:7px}
.perm-lbl{font-size:11.5px;color:var(--muted)}
.btn-rm{
  background:#fff;border:1.5px solid var(--borde);
  color:var(--muted);border-radius:7px;padding:5px 10px;
  font-size:11.5px;cursor:pointer;transition:all .2s;
}
.btn-rm:hover{border-color:var(--rojo);color:var(--rojo);background:#fff5f5}
.empty{padding:1.5rem;text-align:center;color:var(--muted);font-size:13px}
/* ── INSTITUTION PORTAL ── */
.inst-header{background:linear-gradient(135deg,var(--azul),var(--azul-m));color:#fff;border-radius:14px;padding:1.4rem 1.8rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:1rem}
.inst-header-icon{width:52px;height:52px;background:rgba(255,255,255,.18);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.inst-header-icon svg{color:#fff}
.inst-header-name{font-size:22px;font-weight:800;margin-bottom:3px}
.inst-header-sub{font-size:13px;opacity:.82}
.inst-mod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:1.25rem}
.inst-mod-card{background:#fff;border:1.5px solid var(--borde);border-radius:12px;padding:16px 18px;display:flex;align-items:center;gap:14px;text-decoration:none;color:inherit;transition:box-shadow .18s,border-color .18s;cursor:pointer}
.inst-mod-card:hover{border-color:var(--azul-m);box-shadow:0 4px 18px rgba(10,45,110,.11)}
.inst-mod-card-icon{width:40px;height:40px;background:var(--azul-c);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--azul-m)}
.inst-mod-card-name{font-size:13.5px;font-weight:700;color:var(--azul);margin-bottom:2px}
.inst-mod-card-desc{font-size:11.5px;color:var(--muted);line-height:1.4}
.inst-mod-card-arr{margin-left:auto;color:var(--azul-m);font-size:18px;font-weight:300;flex-shrink:0}

/* ── INST CONFIG ROW ── */
.inst-cfg{
  padding:4px 10px 14px 10px;background:#f5f8ff;
}
.inst-cfg-inner{border:1.5px solid #c8d5ee;border-radius:10px;padding:12px}
.inst-cfg-title{font-size:11px;font-weight:700;color:#1455a4;margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em}
.inst-cfg-grid{display:grid;grid-template-columns:2fr 2fr 2fr 1fr;gap:8px}
.inst-lbl{font-size:11px;color:#6b7fa3;display:block;margin-bottom:3px}
.inst-inp{width:100%;padding:6px 8px;border:1.5px solid var(--borde);border-radius:8px;font-size:12px;font-family:inherit}

/* ── TAB TOOLBAR ── */
.tab-toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:1.1rem;flex-wrap:wrap}
.tab-add-form{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.tab-inp{padding:8px 12px;border:1.5px solid var(--borde);border-radius:9px;font-size:13px;font-family:inherit;background:#fff;outline:none;transition:border .2s}
.tab-inp:focus{border-color:var(--azul-m);box-shadow:0 0 0 3px rgba(20,85,164,.1)}
.btn-prim{padding:9px 18px;background:linear-gradient(135deg,var(--azul-m),var(--azul));color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .2s;white-space:nowrap}
.btn-prim:hover{opacity:.88}
.btn-ghost{padding:8px 14px;background:#fff;border:1.5px solid var(--borde);color:var(--muted);border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-ghost:hover{border-color:var(--azul-m);color:var(--azul-m);background:var(--azul-c)}
.tab-empty{text-align:center;padding:3rem 1rem;color:#9aadcc}
.tab-empty .ico{display:flex;justify-content:center;margin-bottom:.85rem;color:#c4cfde}
.tab-empty p{font-size:14px;line-height:1.6}

/* ── CALENDARIO ── */
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.cal-title{font-size:20px;font-weight:800;color:var(--azul)}
.cal-nav{display:flex;gap:6px;align-items:center}
.cal-navbtn{width:34px;height:34px;border-radius:9px;border:1.5px solid var(--borde);background:#fff;color:var(--azul-m);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.cal-navbtn:hover{border-color:var(--azul-m);background:var(--azul-c)}
/* Vista anual — 12 minicalendarios */
.cal-year-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.cal-mini{background:#fff;border:1.5px solid var(--borde);border-radius:12px;padding:12px;transition:box-shadow .2s}
.cal-mini:hover{box-shadow:0 4px 16px rgba(10,45,110,.08)}
.cal-mini-title{font-size:12px;font-weight:800;color:var(--azul);text-align:center;margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em}
.cal-mini-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.cal-mini-dow{text-align:center;font-size:8.5px;font-weight:700;color:var(--muted);padding:3px 0;text-transform:uppercase}
.cal-mini-cell{text-align:center;padding:2px 0;border-radius:5px;cursor:pointer;transition:background .12s;display:flex;flex-direction:column;align-items:center;gap:1px;min-height:22px}
.cal-mini-cell:hover{background:var(--azul-c)}
.cal-mini-cell.empty{cursor:default}
.cal-mini-cell.empty:hover{background:transparent}
.cal-mini-cell.today{background:var(--azul-m);border-radius:5px}
.cal-mini-cell.today .cal-mini-daynum{color:#fff;font-weight:800}
.cal-mini-daynum{font-size:10px;font-weight:600;color:var(--texto);line-height:1.5}
.cal-mini-dots{display:flex;gap:2px;justify-content:center;padding-bottom:1px}
.cal-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0}
/* Lista de eventos del año */
.cal-list{margin-top:1.75rem}
.cal-list-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.75rem;padding-bottom:.5rem;border-bottom:2px solid var(--gris)}
.cal-item{display:flex;align-items:flex-start;gap:12px;padding:11px 13px;background:#fafbfd;border:1px solid var(--borde);border-radius:10px;margin-bottom:7px}
.cal-item-date{width:48px;flex-shrink:0;text-align:center;background:linear-gradient(135deg,var(--azul-m),var(--azul));color:#fff;border-radius:9px;padding:5px 0}
.cal-item-day{font-size:18px;font-weight:800;line-height:1}
.cal-item-mon{font-size:9px;text-transform:uppercase;letter-spacing:.05em;margin-top:1px}
.cal-item-body{flex:1;min-width:0}
.cal-item-name{font-size:14px;font-weight:700;color:var(--azul)}
.cal-item-meta{font-size:12px;color:var(--muted);margin-top:2px}
.cal-item-del{background:none;border:none;color:#c4cfde;font-size:15px;cursor:pointer;padding:2px 6px;border-radius:6px;flex-shrink:0;transition:color .2s}
.cal-item-del:hover{color:var(--rojo)}

/* ── DOC / REPO LIST ── */
.dr-item{display:flex;align-items:center;gap:13px;padding:13px 15px;background:#fff;border:1.5px solid var(--borde);border-radius:12px;margin-bottom:9px;box-shadow:0 2px 8px rgba(10,45,110,.05);transition:all .2s}
.dr-item:hover{border-color:var(--azul-m);box-shadow:0 5px 16px rgba(10,45,110,.1)}
.dr-ico{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--azul-c),#d5e8ff);color:var(--azul-m);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dr-info{flex:1;min-width:0}
.dr-name{font-size:14px;font-weight:700;color:var(--azul)}
.dr-meta{font-size:12px;color:var(--muted);margin-top:2px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.dr-badge{display:inline-flex;padding:2px 9px;border-radius:11px;font-size:10.5px;font-weight:700;background:var(--azul-c);color:var(--azul-m)}
.dr-acts{display:flex;gap:6px;flex-shrink:0;align-items:center}
.dr-open{padding:6px 13px;background:var(--azul-m);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none;white-space:nowrap}
.dr-open:hover{opacity:.88}
.dr-del{padding:6px 10px;background:#fff;border:1.5px solid var(--borde);color:var(--muted);border-radius:8px;font-size:13px;cursor:pointer;transition:all .2s}
.dr-del:hover{border-color:var(--rojo);color:var(--rojo)}
.repo-cat{font-size:12px;font-weight:800;color:var(--azul);text-transform:uppercase;letter-spacing:.05em;margin:1.4rem 0 .75rem;display:flex;align-items:center;gap:8px}
.repo-cat:first-child{margin-top:0}
.repo-cat::after{content:'';flex:1;height:1px;background:var(--borde)}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(10,25,55,.5);display:none;align-items:center;justify-content:center;z-index:200;padding:1rem}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:16px;max-width:440px;width:100%;box-shadow:0 24px 64px rgba(0,0,0,.3);overflow:hidden;animation:mpop .25s ease}
@keyframes mpop{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}
.modal-head{background:linear-gradient(135deg,var(--azul-m),var(--azul));color:#fff;padding:1rem 1.4rem;font-size:15px;font-weight:800;display:flex;align-items:center;justify-content:space-between}
.modal-x{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;opacity:.8;line-height:1}
.modal-x:hover{opacity:1}
.modal-body{padding:1.4rem}
.modal-field{margin-bottom:1rem}
.modal-field label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.modal-field input,.modal-field textarea,.modal-field select{width:100%;padding:9px 12px;border:1.5px solid var(--borde);border-radius:9px;font-size:13.5px;font-family:inherit;background:#fafbfd;outline:none;transition:border .2s}
.modal-field input:focus,.modal-field textarea:focus,.modal-field select:focus{border-color:var(--azul-m);background:#fff;box-shadow:0 0 0 3px rgba(20,85,164,.09)}
.modal-field textarea{min-height:70px;resize:vertical}
.modal-foot{display:flex;gap:9px;justify-content:flex-end;margin-top:1.3rem}

/* ── TABLET ── */
@media(max-width:900px){
  .cal-year-grid{grid-template-columns:repeat(3,1fr)}
}
/* ── MOBILE ── */
@media(max-width:600px){
  .container{padding:1rem .75rem 2rem}
  .card{padding:1.1rem;border-radius:11px}
  .unit-grid{grid-template-columns:1fr}
  .mod-grid{grid-template-columns:1fr}
  .access-form{flex-direction:column}
  .access-table{font-size:12px}
  .inst-cfg-grid{grid-template-columns:1fr 1fr}
  .cal-year-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .cal-mini{padding:9px}

var DB_ETAPAS_PESOS  = [0.10,0.30,0.10,0.10,0.05,0.05,0.05,0.05,0.05,0.05,0.05,0.05];
var DB_ETAPAS_LABELS = ['Relevamiento','Modelación SOL','Automatización','Testing','Producción','Video/Talleres','Transferencia','Traslado Hosting','Pruebas Producción','Acuerdos','Socialización','Disponible al ciudadano'];

function dbCalcPct(e){ return DB_ETAPAS_PESOS.reduce(function(s,p,i){ return s+(e&&e[i]?p:0); },0); }

function dbEffective(patches){
  var base = DB_DEFAULT.map(function(d){
    var p = patches[d.id]||{};
    if(p._deleted) return null;
    return {id:d.id, inst:p.inst||d.inst, t:p.tramite||d.t, e:p.etapas||d.e, a:p.activo||d.a, l:p.aloj||d.l};
  }).filter(Boolean);
  Object.keys(patches).forEach(function(k){
    var r=patches[k];
    if(r&&r._new&&!r._deleted) base.push({id:k, inst:r.inst||'', t:r.tramite||'', e:r.etapas||[], a:r.activo||'', l:r.aloj||''});
  });
  return base;
}

function dbEstado(e){ var p=dbCalcPct(e); if(p>=1)return'En operación'; if(p>0)return'En proceso'; return'No iniciado'; }

async function renderInicio(unitKey) {
  app.innerHTML = '<div style="padding:3rem;text-align:center;color:var(--muted)"><div style="font-size:28px;margin-bottom:.75rem">⏳</div>Cargando datos...</div>';
  var res = await sb.from('diger_tram').select('value').eq('key','tram').maybeSingle();
  var patches = (res.data && res.data.value) || {};
  var all = dbEffective(patches);

  // ── Filtros activos ──
  var fInst  = '';
  var fEstado = '';
  var fAloj  = '';

  function filtered(){
    return all.filter(function(r){
      if(fInst   && r.inst !== fInst)   return false;
      if(fAloj   && r.l    !== fAloj)   return false;
      if(fEstado && dbEstado(r.e) !== fEstado) return false;
      return true;
    });
  }

  // ── SVG helpers ──────────────────────────────────────────────────
  function p2c(cx,cy,r,deg){ var rd=(deg-90)*Math.PI/180; return {x:cx+r*Math.cos(rd),y:cy+r*Math.sin(rd)}; }
  function svgArc(cx,cy,r,s,e){ var sp=p2c(cx,cy,r,s),ep=p2c(cx,cy,r,e),lg=e-s>180?1:0; return 'M '+sp.x.toFixed(2)+' '+sp.y.toFixed(2)+' A '+r+' '+r+' 0 '+lg+' 1 '+ep.x.toFixed(2)+' '+ep.y.toFixed(2); }
  var FF='font-family="Segoe UI,sans-serif"';

  // GAUGE (semicircle)
  function gaugeChart(pct,label){
    var cx=150,cy=130,r=100,sw=18;
    var color=pct>=0.8?'#16a34a':pct>=0.5?'#1455a4':'#f59e0b';
    // End point of fill arc (angle: 180° at pct=0 → 0° at pct=1)
    var angleDeg=180-pct*180;
    var endX=cx+r*Math.cos(angleDeg*Math.PI/180);
    var endY=cy-r*Math.sin(angleDeg*Math.PI/180);
    var lg=pct>0.5?1:0;
    var fillD=pct<=0?'':pct>=1
      ?'M '+(cx-r).toFixed(1)+' '+cy+' A '+r+' '+r+' 0 1 1 '+(cx+r).toFixed(1)+' '+cy
      :'M '+(cx-r).toFixed(1)+' '+cy+' A '+r+' '+r+' 0 '+lg+' 1 '+endX.toFixed(1)+' '+endY.toFixed(1);
    var pctTxt=Math.round(pct*100)+'%';
    return '<svg viewBox="0 0 300 150" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-height:180px">'+
      '<path d="M '+(cx-r).toFixed(1)+' '+cy+' A '+r+' '+r+' 0 0 1 '+(cx+r).toFixed(1)+' '+cy+'" fill="none" stroke="#e8eef8" stroke-width="'+sw+'" stroke-linecap="butt"/>'+
      (pct>0?'<path d="'+fillD+'" fill="none" stroke="'+color+'" stroke-width="'+sw+'" stroke-linecap="round"/>' : '')+
      '<text x="'+cx+'" y="'+(cy-16)+'" text-anchor="middle" '+FF+' font-size="38" font-weight="900" fill="'+color+'">'+pctTxt+'</text>'+
      '<text x="'+cx+'" y="'+(cy+2)+'" text-anchor="middle" '+FF+' font-size="12" fill="#64748b">'+esc(label)+'</text>'+
      '<text x="'+(cx-r-2)+'" y="'+(cy+16)+'" text-anchor="middle" '+FF+' font-size="10" fill="#94a3b8">0%</text>'+
      '<text x="'+(cx+r+2)+'" y="'+(cy+16)+'" text-anchor="middle" '+FF+' font-size="10" fill="#94a3b8">100%</text>'+
    '</svg>';
  }

  // DONUT CHART
  function donutChart(segs,centerTxt,centerSub){
    var cx=110,cy=95,r=72,inner=44;
    var total=segs.reduce(function(s,g){ return s+g.v; },0)||1;
    var cur=-90,paths='';
    segs.forEach(function(g){
      if(!g.v) return;
      var ang=(g.v/total)*360;
      if(ang>=359.9){ paths+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+g.c+'"/><circle cx="'+cx+'" cy="'+cy+'" r="'+inner+'" fill="white"/>'; cur+=ang; return; }
      var ea=cur+ang,sp=p2c(cx,cy,r,cur),ep=p2c(cx,cy,r,ea),si=p2c(cx,cy,inner,ea),ei=p2c(cx,cy,inner,cur),lg=ang>180?1:0;
      paths+='<path d="M '+sp.x.toFixed(1)+' '+sp.y.toFixed(1)+' A '+r+' '+r+' 0 '+lg+' 1 '+ep.x.toFixed(1)+' '+ep.y.toFixed(1)+
        ' L '+si.x.toFixed(1)+' '+si.y.toFixed(1)+' A '+inner+' '+inner+' 0 '+lg+' 0 '+ei.x.toFixed(1)+' '+ei.y.toFixed(1)+'Z" fill="'+g.c+'" stroke="white" stroke-width="2"/>';
      cur=ea;
    });
    var legend=segs.map(function(g,i){
      var lx=8+(i%2)*110,ly=200+(Math.floor(i/2)*16);
      return '<rect x="'+lx+'" y="'+ly+'" width="10" height="10" rx="2" fill="'+g.c+'"/>'+
        '<text x="'+(lx+14)+'" y="'+(ly+9)+'" '+FF+' font-size="10" fill="#64748b">'+esc(g.l)+' ('+g.v+')</text>';
    }).join('');
    return '<svg viewBox="0 0 220 230" xmlns="http://www.w3.org/2000/svg" style="width:100%">'+
      paths+
      '<text x="'+cx+'" y="'+(cy-4)+'" text-anchor="middle" '+FF+' font-size="22" font-weight="900" fill="#0a2d6e">'+centerTxt+'</text>'+
      '<text x="'+cx+'" y="'+(cy+13)+'" text-anchor="middle" '+FF+' font-size="10" fill="#64748b">'+esc(centerSub)+'</text>'+
      legend+
    '</svg>';
  }

  // PIE CHART
  function pieChart(segs){
    var cx=110,cy=90,r=78;
    var total=segs.reduce(function(s,g){ return s+g.v; },0)||1;
    var cur=-90,paths='';
    segs.forEach(function(g){
      if(!g.v) return;
      var ang=(g.v/total)*360;
      if(ang>=359.9){ paths+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+g.c+'"/>'; cur+=ang; return; }
      var ea=cur+ang,sp=p2c(cx,cy,r,cur),ep=p2c(cx,cy,r,ea),lg=ang>180?1:0;
      paths+='<path d="M '+cx+' '+cy+' L '+sp.x.toFixed(1)+' '+sp.y.toFixed(1)+' A '+r+' '+r+' 0 '+lg+' 1 '+ep.x.toFixed(1)+' '+ep.y.toFixed(1)+'Z" fill="'+g.c+'" stroke="white" stroke-width="2"/>';
      cur=ea;
    });
    var legend=segs.map(function(g,i){
      var ly=190+i*16;
      return '<rect x="8" y="'+ly+'" width="10" height="10" rx="2" fill="'+g.c+'"/>'+
        '<text x="22" y="'+(ly+9)+'" '+FF+' font-size="10" fill="#64748b">'+esc(g.l)+' — '+Math.round(g.v/total*100)+'% ('+g.v+')</text>';
    }).join('');
    return '<svg viewBox="0 0 220 '+(195+segs.length*16)+'" xmlns="http://www.w3.org/2000/svg" style="width:100%">'+
      paths+legend+'</svg>';
  }

  // VERTICAL BAR CHART (institutions)
  // STACKED HORIZONTAL BAR (institutions × estado)
  function stackedHBar(rows){
    var pL=188,pR=70,pT=8,rH=30,w=660;
    var maxT=Math.max.apply(null,rows.map(function(r){ return r.total; }))||1;
    var cW=w-pL-pR, h=pT+rows.length*rH+24;
    var bg='<rect x="'+pL+'" y="'+pT+'" width="'+cW+'" height="'+(rows.length*rH)+'" fill="#f8faff" rx="4"/>';
    var grid=[0.25,0.5,0.75,1].map(function(t){
      var x=pL+t*cW;
      return '<line x1="'+x.toFixed(1)+'" y1="'+pT+'" x2="'+x.toFixed(1)+'" y2="'+(pT+rows.length*rH)+'" stroke="#e8eef8" stroke-width="1" stroke-dasharray="3,2"/>';
    }).join('');
    var bars=rows.map(function(row,i){
      var y=pT+i*rH, by=y+rH*.14, bh=rH*.72;
      var totalW=(row.total/maxT)*cW;
      var opW=row.total?Math.round((row.op/row.total)*totalW):0;
      var prW=row.total?Math.round((row.proc/row.total)*totalW):0;
      var niW=Math.max(0,Math.round(totalW)-opW-prW);
      var short=row.label.length>26?row.label.slice(0,25)+'…':row.label;
      var pct=Math.round(row.avgPct*100);
      var pc=pct>=80?'#16a34a':pct>=50?'#1455a4':'#f59e0b';
      return '<text x="'+(pL-6)+'" y="'+(by+bh*.65).toFixed(1)+'" text-anchor="end" '+FF+' font-size="10.5" fill="#1c2333">'+esc(short)+'</text>'+
        '<rect x="'+pL+'" y="'+by.toFixed(1)+'" width="'+totalW.toFixed(1)+'" height="'+bh.toFixed(1)+'" rx="3" fill="#e8eef8"/>'+
        (opW>0?'<rect x="'+pL+'" y="'+by.toFixed(1)+'" width="'+opW+'" height="'+bh.toFixed(1)+'" rx="3" fill="#16a34a"/>':'')+
        (prW>0?'<rect x="'+(pL+opW)+'" y="'+by.toFixed(1)+'" width="'+prW+'" height="'+bh.toFixed(1)+'" fill="#f59e0b"/>':'')+
        (niW>0?'<rect x="'+(pL+opW+prW)+'" y="'+by.toFixed(1)+'" width="'+niW+'" height="'+bh.toFixed(1)+'" fill="#fca5a5"/>':'')+
        '<text x="'+(pL+totalW+5).toFixed(1)+'" y="'+(by+bh*.65).toFixed(1)+'" '+FF+' font-size="9.5" fill="#94a3b8">'+row.total+'</text>'+
        '<text x="'+(pL+cW+5).toFixed(1)+'" y="'+(by+bh*.65).toFixed(1)+'" '+FF+' font-size="11" font-weight="800" fill="'+pc+'">'+pct+'%</text>';
    }).join('');
    var legend=[{c:'#16a34a',l:'En operación'},{c:'#f59e0b',l:'En proceso'},{c:'#fca5a5',l:'No iniciado'}]
      .map(function(g,i){ var lx=pL+i*150; return '<rect x="'+lx+'" y="'+(h-14)+'" width="14" height="7" rx="2" fill="'+g.c+'"/><text x="'+(lx+18)+'" y="'+(h-6)+'" '+FF+' font-size="10" fill="#64748b">'+g.l+'</text>'; }).join('');
    return '<svg viewBox="0 0 '+w+' '+h+'" xmlns="http://www.w3.org/2000/svg" style="width:100%">'+bg+grid+bars+legend+'</svg>';
  }

  // RANKING CARD (top3 / bottom3 HTML)
  function rankingCard(ranked){

      var pct=Math.round(r.avgPct*100),col=isTop?'#16a34a':'#dc2626',bg=isTop?'#dcfce7':'#fee2e2';

          '<div style="height:5px;background:#e8eef8;border-radius:99px;margin-top:4px"><div style="height:100%;width:'+Math.max(pct,2)+'%;background:'+col+';border-radius:99px"></div></div>'+

  // LINE CHART
  function lineChart(series, xLabels){
    var pL=44,pR=20,pT=24,pB=58,w=600,h=230;
    var cW=w-pL-pR,cH=h-pT-pB,n=xLabels.length;
    // Y-axis grid (0%, 25%, 50%, 75%, 100%)
    var grid=[0,0.25,0.5,0.75,1].map(function(t){
      var y=pT+cH-t*cH;
      return '<line x1="'+pL+'" y1="'+y.toFixed(1)+'" x2="'+(w-pR)+'" y2="'+y.toFixed(1)+'" stroke="'+(t===0?'#c8d4e8':'#e8eef8')+'" stroke-width="'+(t===0?1.5:1)+'"/>'+
        '<text x="'+(pL-5)+'" y="'+(y+4).toFixed(1)+'" text-anchor="end" '+FF+' font-size="9" fill="#94a3b8">'+Math.round(t*100)+'%</text>';
    }).join('');
    // X-axis labels
    var xLabelsEl=xLabels.map(function(lbl,i){
      var x=pL+(i/(n-1))*cW;
      var short=lbl.length>10?lbl.slice(0,9)+'…':lbl;
      return '<text x="'+x.toFixed(1)+'" y="'+(h-pB+14)+'" text-anchor="end" transform="rotate(-35,'+x.toFixed(1)+','+(h-pB+14)+')" '+FF+' font-size="9" fill="#64748b">'+esc(short)+'</text>';
    }).join('');
    // Lines + circles per series
    var lines=series.map(function(s){
      var pts=s.data.map(function(v,i){ return {x:pL+(i/(n-1))*cW, y:pT+cH-v*cH}; });
      var poly='<polyline points="'+pts.map(function(p){ return p.x.toFixed(1)+','+p.y.toFixed(1); }).join(' ')+'" fill="none" stroke="'+s.color+'" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>';
      var dots=pts.map(function(p,i){
        return '<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="4" fill="white" stroke="'+s.color+'" stroke-width="2"/>'+
          '<title>'+esc(xLabels[i])+': '+Math.round(s.data[i]*100)+'%</title>';
      }).join('');
      return poly+dots;
    }).join('');
    // Legend
    var legend=series.map(function(s,i){
      var lx=pL+i*160;
      return '<rect x="'+lx+'" y="'+(h-14)+'" width="20" height="3" rx="1.5" fill="'+s.color+'"/>'+
        '<circle cx="'+(lx+10)+'" cy="'+(h-13)+'" r="3.5" fill="white" stroke="'+s.color+'" stroke-width="2"/>'+
        '<text x="'+(lx+26)+'" y="'+(h-9)+'" '+FF+' font-size="11" fill="#334155">'+esc(s.label)+'</text>';
    }).join('');
    return '<svg viewBox="0 0 '+w+' '+h+'" xmlns="http://www.w3.org/2000/svg" style="width:100%">'+
      '<rect x="'+pL+'" y="'+pT+'" width="'+cW+'" height="'+cH+'" fill="#f8faff" rx="4"/>'+
      grid+xLabelsEl+lines+legend+
    '</svg>';
  }

  function vBarChart(iList,iMap,iPct){
    var n=iList.length,pL=36,pR=10,pT=18,pB=52,w=Math.max(420,n*38+pL+pR),h=220;

  function renderDash(){
    var data = filtered();
    var total = data.length;
    var op   = data.filter(function(r){ return dbCalcPct(r.e)>=1; }).length;
    var proc = data.filter(function(r){ var p=dbCalcPct(r.e); return p>0&&p<1; }).length;
    var ni   = data.filter(function(r){ return dbCalcPct(r.e)===0; }).length;
    var avgPct = total ? data.reduce(function(s,r){ return s+dbCalcPct(r.e); },0)/total : 0;

    var insts  = [...new Set(all.map(function(r){ return r.inst; }))].sort();
    var alojs  = [...new Set(all.map(function(r){ return r.l; }).filter(Boolean))].sort();
    var estados = ['En operación','En proceso','No iniciado'];

    function fOpt(arr,cur,ph){
      return '<option value="">'+ph+'</option>'+arr.map(function(v){
        return '<option value="'+esc(v)+'"'+(cur===v?' selected':'')+'>'+esc(v)+'</option>';
      }).join('');
    }

    // Stage % (fraction)
    var stageVals = DB_ETAPAS_LABELS.map(function(_,i){
      return total ? data.filter(function(r){ return r.e&&r.e[i]; }).length/total : 0;
    });

    // Line chart series: DIGER vs PROPIO per etapa
    var digerData = data.filter(function(r){ return (r.l||'').toUpperCase()==='DIGER'; });
    var propioData = data.filter(function(r){ return (r.l||'').toUpperCase()==='PROPIO'; });
    var lineSeries = [
      { label:'DIGER', color:'#1455a4', data: DB_ETAPAS_LABELS.map(function(_,i){ return digerData.length ? digerData.filter(function(r){ return r.e&&r.e[i]; }).length/digerData.length : 0; }) },
      { label:'PROPIO', color:'#e03e3e', data: DB_ETAPAS_LABELS.map(function(_,i){ return propioData.length ? propioData.filter(function(r){ return r.e&&r.e[i]; }).length/propioData.length : 0; }) }
    ].filter(function(s){ return s.data.some(function(v){ return v>0; }); });

    // Institution maps
    var instMap={},instPct={},instOp={},instProc={},instNi={};
    data.forEach(function(r){
      var p=dbCalcPct(r.e), inst=r.inst;
      instMap[inst]=(instMap[inst]||0)+1;
      instPct[inst]=(instPct[inst]||0)+p;
      if(p>=1){ instOp[inst]=(instOp[inst]||0)+1; }
      else if(p>0){ instProc[inst]=(instProc[inst]||0)+1; }
      else { instNi[inst]=(instNi[inst]||0)+1; }
    });
    var instList=Object.keys(instMap).sort(function(a,b){ return instMap[b]-instMap[a]; });
    // Ranking: sorted by avg completion desc
    var ranked=instList.map(function(inst){
      return {inst:inst, avgPct:instPct[inst]/(instMap[inst]||1)};
    }).sort(function(a,b){ return b.avgPct-a.avgPct; });
    // Stacked bar rows: sorted by avg completion desc
    var stackRows=ranked.map(function(r){
      return {label:r.inst,op:instOp[r.inst]||0,proc:instProc[r.inst]||0,ni:instNi[r.inst]||0,total:instMap[r.inst],avgPct:r.avgPct};
    });

    // Alojamiento
    // Alojamiento por institución (una sola vez por inst, tomando el valor más frecuente)
    var instAloj={};
    data.forEach(function(r){ var k=(r.l||'—').toUpperCase().replace(/^PROPI[AO]$/,'PROPIO'); if(!instAloj[r.inst]) instAloj[r.inst]=k; });
    var alojMap={};
    Object.keys(instAloj).forEach(function(inst){ var k=instAloj[inst]; alojMap[k]=(alojMap[k]||0)+1; });
    var alojColors=['#1455a4','#16a34a','#f59e0b','#8b5cf6','#dc2626'];
    var alojSegs=Object.keys(alojMap).map(function(k,i){ return {v:alojMap[k],c:alojColors[i%5],l:k}; });

    var html=
      tabBreadcrumb(unitKey,'Inicio')+
      '<div style="display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:.5rem;margin-bottom:1rem">'+
        '<div>'+
          '<div style="font-size:20px;font-weight:800;color:var(--azul)">Panel de seguimiento de digitalización</div>'+
          '<div style="font-size:12px;color:var(--muted);margin-top:2px">Control dinámico por institución, estado y alojamiento</div>'+
        '</div>'+
        '<button class="btn-prim" onclick="renderInicio(\''+unitKey+'\')" style="font-size:12px;padding:7px 14px">↻ Actualizar</button>'+
      '</div>'+

      // Filtros
      '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:1.1rem">'+
        '<div style="min-width:170px;flex:1"><div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px">Institución</div>'+
        '<select class="db-sel" onchange="window._dbFInst=this.value;window._dbRedraw()">'+fOpt(insts,fInst,'Todas')+'</select></div>'+
        '<div style="min-width:140px;flex:1"><div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px">Estado</div>'+
        '<select class="db-sel" onchange="window._dbFEstado=this.value;window._dbRedraw()">'+fOpt(estados,fEstado,'Todos')+'</select></div>'+
        '<div style="min-width:140px;flex:1"><div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px">Alojamiento</div>'+
        '<select class="db-sel" onchange="window._dbFAloj=this.value;window._dbRedraw()">'+fOpt(alojs,fAloj,'Todos')+'</select></div>'+
      '</div>'+

      // KPI cards — con badge de % y barra de progreso
      '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.25rem">'+
        kpiCard('Total trámites', total, [...new Set(data.map(function(r){return r.inst;}))].length+' instituciones', '#0a2d6e', null)+
        kpiCard('En operación', op, 'Completados al 100%', '#16a34a', total?op/total:null)+
        kpiCard('En proceso', proc, 'Avance parcial', '#f59e0b', total?proc/total:null)+
        kpiCard('No iniciados', ni, 'Sin avance registrado', '#dc2626', total?ni/total:null)+
      '</div>'+

      // Fila 1 (2 cols): Donut | Ranking
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.1rem">'+
        '<div class="card" style="padding:1rem 1.25rem">'+
          '<div style="font-size:15px;font-weight:800;color:var(--azul);margin-bottom:.75rem;padding-bottom:.4rem;border-bottom:2px solid var(--azul-c)">Estado de trámites</div>'+
          donutChart([{v:op,c:'#16a34a',l:'En operación'},{v:proc,c:'#f59e0b',l:'En proceso'},{v:ni,c:'#dc2626',l:'No iniciado'}],total,'trámites')+
        '</div>'+
        '<div class="card" style="padding:1rem 1.25rem">'+
          '<div style="font-size:15px;font-weight:800;color:var(--azul);margin-bottom:.75rem;padding-bottom:.4rem;border-bottom:2px solid var(--azul-c)">Ranking de instituciones</div>'+
          rankingCard(ranked)+
        '</div>'+
      '</div>'+

      // Fila 2 (full): Stacked hbar por institución (op/proc/ni)
      '<div class="card" style="padding:1rem 1.25rem;margin-bottom:1.1rem;overflow-x:auto">'+
        '<div style="display:flex;align-items:baseline;gap:12px;margin-bottom:.75rem;padding-bottom:.4rem;border-bottom:2px solid var(--azul-c)">'+
          '<div style="font-size:15px;font-weight:800;color:var(--azul)">Estado por institución</div>'+
          '<div style="font-size:11px;color:var(--muted)">Ordenado por % de avance promedio</div>'+
        '</div>'+
        stackedHBar(stackRows)+
      '</div>'+

      // Fila 3 (2 cols): Líneas+Pie | Cumplimiento por etapa
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.1rem">'+
        '<div class="card" style="padding:1rem 1.25rem;overflow-x:auto">'+
          '<div style="font-size:15px;font-weight:800;color:var(--azul);margin-bottom:.75rem;padding-bottom:.4rem;border-bottom:2px solid var(--azul-c)">Avance por etapa según alojamiento</div>'+
          '<div style="display:flex;gap:12px;align-items:flex-start">'+
            '<div style="flex:1;min-width:0">'+lineChart(lineSeries, DB_ETAPAS_LABELS)+'</div>'+
            '<div style="width:160px;flex-shrink:0">'+
              '<div style="font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Distribución</div>'+
              pieChart(alojSegs)+
            '</div>'+
          '</div>'+
        '</div>'+
        '<div class="card" style="padding:1rem 1.25rem;overflow-x:auto">'+
          '<div style="font-size:15px;font-weight:800;color:var(--azul);margin-bottom:.75rem;padding-bottom:.4rem;border-bottom:2px solid var(--azul-c)">Cumplimiento por etapa del proceso</div>'+
          hBarChart(DB_ETAPAS_LABELS,stageVals)+
        '</div>'+
      '</div>'+

      // Tabla detalle — acordeón por institución
      (function(){
        var TH='padding:7px 12px;text-align:left;font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid var(--borde)';
        var rows=stackRows.map(function(row,idx){
          var gId='_ig'+idx;
          var tramites=data.filter(function(r){ return r.inst===row.label; }).sort(function(a,b){ return dbCalcPct(b.e)-dbCalcPct(a.e); });
          var avgC=row.avgPct>=1?'#16a34a':row.avgPct>=0.6?'#1455a4':'#f59e0b';
          var headerTr='<tr onclick="window._toggleInst(\''+gId+'\')" style="cursor:pointer;background:#f4f7fd;border-bottom:1px solid var(--borde)">'+
            '<td style="padding:9px 14px;font-weight:800;color:var(--azul);font-size:12.5px">'+
              '<span id="ic-'+gId+'" style="display:inline-block;width:14px;font-size:9px;opacity:.6">▶</span> '+esc(row.label)+
            '</td>'+
            '<td style="padding:9px 10px;text-align:center">'+
              '<span style="font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:20px;background:var(--azul-c);color:var(--azul)">'+row.total+' trám.</span>'+
            '</td>'+
            '<td style="padding:9px 10px;text-align:center;font-size:11.5px;font-weight:800;color:#16a34a">'+row.op+'</td>'+
            '<td style="padding:9px 10px;text-align:center;font-size:11.5px;font-weight:800;color:#f59e0b">'+row.proc+'</td>'+
            '<td style="padding:9px 10px;text-align:center;font-size:11.5px;font-weight:800;color:#dc2626">'+row.ni+'</td>'+
            '<td style="padding:9px 14px">'+
              '<div style="display:flex;align-items:center;gap:6px">'+
                '<div style="width:64px;height:5px;background:#e8eef8;border-radius:99px;overflow:hidden"><div style="height:100%;width:'+Math.round(row.avgPct*100)+'%;background:'+avgC+';border-radius:99px"></div></div>'+
                '<span style="font-size:12px;font-weight:800;color:'+avgC+'">'+Math.round(row.avgPct*100)+'%</span>'+
              '</div>'+
            '</td>'+
          '</tr>';
          var subRows='<tbody id="'+gId+'" style="display:none">'+
            '<tr style="background:#eef1f7">'+
              '<th style="padding:5px 14px 5px 34px;text-align:left;font-size:9.5px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.05em" colspan="2">Trámite</th>'+
              '<th style="padding:5px 10px;text-align:center;font-size:9.5px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.05em" colspan="2">Estado</th>'+
              '<th style="padding:5px 10px;text-align:left;font-size:9.5px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">Alojamiento</th>'+
              '<th style="padding:5px 14px;text-align:left;font-size:9.5px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">Avance</th>'+
            '</tr>'+
            tramites.map(function(r){
              var p=dbCalcPct(r.e),pd=Math.round(p*100),est=dbEstado(r.e);
              var ec=est==='En operación'?'#16a34a':est==='En proceso'?'#f59e0b':'#dc2626';
              var eb=est==='En operación'?'#dcfce7':est==='En proceso'?'#fef3c7':'#fee2e2';
              var bc=p>=1?'#16a34a':p>=0.6?'#1455a4':'#f59e0b';
              return '<tr style="border-bottom:1px solid #f0f4fb">'+
                '<td style="padding:6px 14px 6px 34px;color:var(--texto);font-size:11.5px" colspan="2">'+esc(r.t)+'</td>'+
                '<td colspan="2" style="padding:6px 10px;text-align:center">'+
                  '<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:'+eb+';color:'+ec+'">'+est+'</span>'+
                '</td>'+
                '<td style="padding:6px 10px;font-size:10.5px;color:var(--muted)">'+esc(r.l||'—')+'</td>'+
                '<td style="padding:6px 14px">'+
                  '<div style="display:flex;align-items:center;gap:5px">'+
                    '<div style="width:54px;height:4px;background:#e8eef8;border-radius:99px;overflow:hidden"><div style="height:100%;width:'+pd+'%;background:'+bc+';border-radius:99px"></div></div>'+
                    '<span style="font-size:11px;font-weight:800;color:'+bc+'">'+pd+'%</span>'+
                  '</div>'+
                '</td>'+
              '</tr>';
            }).join('')+
          '</tbody>';
          return '<tbody>'+headerTr+'</tbody>'+subRows;
        }).join('');
        return '<div class="card" style="padding:0;overflow:hidden">'+
          '<div style="display:flex;justify-content:space-between;align-items:center;padding:.85rem 1.25rem;border-bottom:1px solid var(--borde)">'+
            '<div style="font-size:15px;font-weight:800;color:var(--azul)">Detalle por institución</div>'+
            '<div style="display:flex;gap:10px;font-size:11px">'+
              '<span style="color:#16a34a;font-weight:700">● Op: '+op+'</span>'+
              '<span style="color:#f59e0b;font-weight:700">● Proc: '+proc+'</span>'+
              '<span style="color:#dc2626;font-weight:700">● N/I: '+ni+'</span>'+
              '<span style="color:var(--muted)">Clic en institución para desglosar</span>'+
            '</div>'+
          '</div>'+
          '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px">'+
            '<thead><tr style="background:#eef1f7">'+
              '<th style="'+TH+'">Institución</th>'+
              '<th style="'+TH+';text-align:center">Total</th>'+
              '<th style="'+TH+';text-align:center;color:#16a34a">Op.</th>'+
              '<th style="'+TH+';text-align:center;color:#f59e0b">Proc.</th>'+
              '<th style="'+TH+';text-align:center;color:#dc2626">N/I</th>'+
              '<th style="'+TH+'">Avance prom.</th>'+
            '</tr></thead>'+
            rows+
          '</table></div>'+
        '</div>';
      })();

    window._toggleInst = function(id){
      var tb=document.getElementById(id), ic=document.getElementById('ic-'+id);
      if(!tb) return;
      var open=tb.style.display!=='none';
      tb.style.display=open?'none':'';
      if(ic) ic.textContent=open?'▶':'▼';
    };
    app.innerHTML = html;
  }

  function kpiCard(title, val, sub, color, pct){
    var barW = pct!=null ? Math.round(pct*100) : null;
    return '<div class="card" style="padding:1.1rem 1.25rem;border-left:4px solid '+color+'">' +
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.3rem">' +
        '<div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em">'+title+'</div>' +
        (barW!=null?'<span style="font-size:10.5px;font-weight:800;padding:2px 8px;border-radius:20px;background:'+color+'1a;color:'+color+'">'+barW+'%</span>':'') +
      '</div>' +
      '<div style="font-size:34px;font-weight:900;color:'+color+';line-height:1.05">'+val+'</div>' +
      '<div style="font-size:11px;color:var(--muted);margin-top:2px">'+sub+'</div>' +
      (barW!=null?'<div style="height:3px;background:#e8eef8;border-radius:99px;margin-top:8px"><div style="height:100%;width:'+barW+'%;background:'+color+';border-radius:99px"></div></div>':'') +
    '</div>';
  }

  // Expose redraw for filter selects
  window._dbFInst   = fInst;
  window._dbFEstado = fEstado;
  window._dbFAloj   = fAloj;
  window._dbRedraw  = function(){
    fInst   = window._dbFInst;
    fEstado = window._dbFEstado;
    fAloj   = window._dbFAloj;
    renderDash();
  };

  renderDash();

  // Style selects
  var style = document.getElementById('db-sel-style');
  if(!style){
    style = document.createElement('style');
    style.id = 'db-sel-style';
    style.textContent = '.db-sel{width:100%;padding:8px 10px;border:1.5px solid var(--borde);border-radius:8px;font-size:13px;font-family:inherit;background:#fff;outline:none;transition:border .2s}.db-sel:focus{border-color:var(--azul-m)}';
    document.head.appendChild(style);
  }
}

function renderModulos(unitKey) {
  var u = UNITS[unitKey];
  var isAdmin = ses.role === 'admin';
  var acc = ses.access || {};

  var visibles = u.modulos.filter(function(m){ return isAdmin || acc[m.key]; });

  var html =
    '<div class="breadcrumb">' +
      '<a href="unidad.html">Inicio</a><span>›</span><span>' + u.label + '</span>' +
    '</div>' +
    '<div class="welcome">' +
      '<div class="badge">' + u.label + '</div>' +
      '<h2>Módulos habilitados</h2>' +
      '<p>Seleccione el módulo al que desea acceder.</p>' +
    '</div>' +
    '<div class="card" style="padding:0;overflow:hidden">' +
      '<div style="padding:1rem 1.25rem .5rem;border-bottom:1px solid var(--borde)">' +
        '<div class="sec-title" style="margin:0;border:none;padding:0">📂 Documentos de ' + u.label + '</div>' +
      '</div>';

  if (visibles.length === 0) {
    html += '<div class="empty" style="padding:2rem">No tiene módulos habilitados en esta unidad. Contacte al administrador DIGER.</div>';
  } else {
    // Table header
    html +=
      '<div style="padding:8px 14px;background:#f0f4fb;border-bottom:1px solid var(--borde)">' +
        '<div class="list-header" style="background:none;margin:0;padding:0">' +
          '<span></span>' +
          '<span>Nombre del documento</span>' +
          '<span>Tipo</span>' +
          '<span>Descripción</span>' +
          '<span style="text-align:right">Acciones</span>' +
        '</div>' +
      '</div>';

    html += '<div class="mod-list">';

    visibles.forEach(function(m, idx) {
      var subHtml = '';
      if(m.subItems) {
        subHtml = '<div class="mod-sub-list">';
        m.subItems.forEach(function(si){
          var siUrl = si.url;
          subHtml += '<a class="mod-sub-item" href="' + siUrl + '">' +
            '<div class="mod-sub-icon">' + (SVGS[si.icon]||'') + '</div>' +
            '<div><div class="mod-sub-name">' + esc(si.label) + '</div><div class="mod-sub-desc">' + esc(si.desc) + '</div></div>' +
            '<span class="btn-open">Abrir →</span>' +
          '</a>';
        });
        subHtml += '</div>';
      }
      html +=
        '<div class="mod-row" id="modrow-' + idx + '">' +
          '<div class="mod-row-head" style="cursor:default">' +
            '<div class="mod-row-icon" style="color:var(--azul-m)">' + (SVGS[m.icon]||m.icon) + '</div>' +
            '<div class="mod-row-name">' + esc(m.label) + '</div>' +
            '<div><span class="mod-type-badge ' + (m.tipoCls||'') + '">' + esc(m.tipo||'Módulo') + '</span></div>' +
            '<div class="mod-row-desc">' + esc(m.desc) + '</div>' +
            '<div class="mod-row-actions">' +
              (m.url ? '<a class="btn-open" href="' + m.url + '">Abrir →</a>' : '') +
            '</div>' +
          '</div>' +
          subHtml +
        '</div>';
    });

    html += '</div>'; // mod-list
  }

  html += '</div>'; // card
  app.innerHTML = html;
}

function toggleModRow(idx, hasVers) {
  if (!hasVers) return;
  var panel = document.getElementById('modver-' + idx);
  var chev  = document.getElementById('chev-' + idx);
  if (!panel) return;
  var open = panel.classList.toggle('open');
  if (chev) chev.classList.toggle('open', open);
}

function lsGet(key, def) { try { return JSON.parse(localStorage.getItem(key)) || def; } catch { return def; } }
function lsSet(key, val) { localStorage.setItem(key, JSON.stringify(val)); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function tabBreadcrumb(unitKey, tabLabel) {
  var u = UNITS[unitKey];
  return '<div class="breadcrumb">' +
    '<a href="unidad.html">Inicio</a><span>›</span>' +
    '<a href="unidad.html?u=' + unitKey + '">' + esc(u.label) + '</a>' +
    '<span>›</span><span>' + esc(tabLabel) + '</span>' +
  '</div>';
}

// Modal
function abrirModal(title, bodyHtml) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHtml;
  document.getElementById('modal-bg').classList.add('open');
}
function cerrarModal() {
  document.getElementById('modal-bg').classList.remove('open');
  document.getElementById('modal-body').innerHTML = '';
}
document.getElementById('modal-bg').addEventListener('click', function(e){
  if (e.target === this) cerrarModal();
});

function calKey(unitKey) { return 'diger_cal_' + unitKey; }
function calEvents(unitKey) { return lsGet(calKey(unitKey), []); }

function renderCalendario(unitKey) {
  CURRENT_UNIT = unitKey;
  var u = UNITS[unitKey];
  var y = calState.y;
  var hoy = new Date();
  var events = calEvents(unitKey);

  // Mapa fecha -> eventos
  var byDate = {};
  events.forEach(function(ev){ (byDate[ev.fecha] = byDate[ev.fecha] || []).push(ev); });

  var DOT_COLORS = ['#1455a4','#16a34a','#d97706','#dc2626','#7c3aed'];

  // Construir los 12 minicalendarios
  var monthsHtml = '';
  for (var mi = 0; mi < 12; mi++) {
    var first = new Date(y, mi, 1);
    var startDow = (first.getDay() + 6) % 7; // lunes=0
    var daysInMonth = new Date(y, mi+1, 0).getDate();

    var miniGrid = ['L','M','X','J','V','S','D']
      .map(function(d){ return '<div class="cal-mini-dow">' + d + '</div>'; }).join('');

    for (var i = 0; i < startDow; i++) miniGrid += '<div class="cal-mini-cell empty"></div>';

    for (var d = 1; d <= daysInMonth; d++) {
      var fecha = y + '-' + String(mi+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
      var isToday = (y === hoy.getFullYear() && mi === hoy.getMonth() && d === hoy.getDate());
      var evs = byDate[fecha] || [];
      var tooltip = evs.length
        ? evs.map(function(e){ return e.titulo; }).join(', ')
        : 'Agregar evento';
      var dots = evs.slice(0, 4).map(function(_, k){
        return '<span class="cal-dot" style="background:' + DOT_COLORS[k % DOT_COLORS.length] + '"></span>';
      }).join('');
      miniGrid +=
        '<div class="cal-mini-cell' + (isToday ? ' today' : '') + '"' +
        ' onclick="calAddPrompt(\'' + fecha + '\')"' +
        ' title="' + esc(tooltip) + '">' +
          '<span class="cal-mini-daynum">' + d + '</span>' +
          (dots ? '<div class="cal-mini-dots">' + dots + '</div>' : '') +
        '</div>';
    }

    var mesNombre = MESES[mi].charAt(0).toUpperCase() + MESES[mi].slice(1);
    monthsHtml +=
      '<div class="cal-mini">' +
        '<div class="cal-mini-title">' + mesNombre + '</div>' +
        '<div class="cal-mini-grid">' + miniGrid + '</div>' +
      '</div>';
  }

  // Lista de todos los eventos del año, ordenados por fecha
  var yearEvents = events
    .filter(function(ev){ return ev.fecha && ev.fecha.slice(0,4) === String(y); })
    .sort(function(a,b){ return a.fecha.localeCompare(b.fecha) || (a.hora||'').localeCompare(b.hora||''); });

  var listHtml = '';
  if (yearEvents.length) {
    listHtml = '<div class="cal-list">' +
      '<div class="cal-list-title">Eventos ' + y + ' &nbsp;(' + yearEvents.length + ')</div>' +
      yearEvents.map(function(ev){
        var p = ev.fecha.split('-'), mm = +p[1]-1;
        return '<div class="cal-item">' +
          '<div class="cal-item-date">' +
            '<div class="cal-item-day">' + (+p[2]) + '</div>' +
            '<div class="cal-item-mon">' + MESES_C[mm] + '</div>' +
          '</div>' +
          '<div class="cal-item-body">' +
            '<div class="cal-item-name">' + esc(ev.titulo) + '</div>' +
            '<div class="cal-item-meta">' +
              (ev.hora ? '🕒 ' + esc(ev.hora) + ' · ' : '') +
              (ev.desc ? esc(ev.desc) : 'Sin descripción') +
            '</div>' +
          '</div>' +
          '<button class="cal-item-del" onclick="calDelEvent(\'' + ev.id + '\')" title="Eliminar">✕</button>' +
        '</div>';
      }).join('') +
    '</div>';
  }

  app.innerHTML =
    tabBreadcrumb(unitKey, 'Calendario') +
    '<div class="welcome"><div class="badge">' + esc(u.label) + '</div>' +
      '<h2>Calendario</h2><p>Eventos, reuniones y fechas clave de la unidad.</p></div>' +
    '<div class="card">' +
      '<div class="cal-head">' +
        '<div class="cal-title">' + y + '</div>' +
        '<div class="cal-nav">' +
          '<button class="btn-ghost" onclick="calToday()">Hoy</button>' +
          '<button class="cal-navbtn" onclick="calPrev()">‹</button>' +
          '<button class="cal-navbtn" onclick="calNext()">›</button>' +
          '<button class="btn-prim" onclick="calAddPrompt()">+ Evento</button>' +
        '</div>' +
      '</div>' +
      '<div class="cal-year-grid">' + monthsHtml + '</div>' +
      listHtml +
    '</div>';
}

function calPrev() { calState.y--; renderCalendario(CURRENT_UNIT); }
function calNext() { calState.y++; renderCalendario(CURRENT_UNIT); }
function calToday() { calState.y = new Date().getFullYear(); renderCalendario(CURRENT_UNIT); }

function calAddPrompt(fecha) {
  var def = fecha || (calState.y + '-' + String(new Date().getMonth()+1).padStart(2,'0') + '-' + String(new Date().getDate()).padStart(2,'0'));
  abrirModal('Nuevo evento',
    '<div class="modal-field"><label>Título *</label><input type="text" id="ev-titulo" placeholder="Ej: Reunión de coordinación SOL"></div>' +
    '<div class="modal-field"><label>Fecha *</label><input type="date" id="ev-fecha" value="' + def + '"></div>' +
    '<div class="modal-field"><label>Hora</label><input type="time" id="ev-hora"></div>' +
    '<div class="modal-field"><label>Descripción</label><textarea id="ev-desc" placeholder="Detalles del evento…"></textarea></div>' +
    '<div class="modal-foot"><button class="btn-ghost" onclick="cerrarModal()">Cancelar</button>' +
    '<button class="btn-prim" onclick="calSaveEvent()">Guardar evento</button></div>');
}

function calSaveEvent() {
  var titulo = document.getElementById('ev-titulo').value.trim();
  var fecha  = document.getElementById('ev-fecha').value;
  var hora   = document.getElementById('ev-hora').value;
  var desc   = document.getElementById('ev-desc').value.trim();
  if (!titulo) { alert('Ingrese el título del evento.'); return; }
  if (!fecha)  { alert('Seleccione una fecha.'); return; }
  var evs = calEvents(CURRENT_UNIT);
  evs.push({ id: uid(), titulo: titulo, fecha: fecha, hora: hora, desc: desc });
  lsSet(calKey(CURRENT_UNIT), evs);
  cerrarModal();
  var p = fecha.split('-'); calState.y = +p[0]; calState.m = +p[1]-1;
  renderCalendario(CURRENT_UNIT);
}

function calDelEvent(id) {
  if (!confirm('¿Eliminar este evento?')) return;
  var evs = calEvents(CURRENT_UNIT).filter(function(e){ return e.id !== id; });
  lsSet(calKey(CURRENT_UNIT), evs);
  renderCalendario(CURRENT_UNIT);
}

async function guardarNuevoUsuario() {
  var email = (document.getElementById('nu-email').value||'').trim().toLowerCase();
  var rol   = document.getElementById('nu-rol').value;
  var inst  = document.getElementById('nu-inst').value;
  var err   = document.getElementById('nu-err');
  err.style.display = 'none';
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { err.textContent='Ingrese un correo válido.'; err.style.display='block'; return; }
  if (!inst) { err.textContent='Seleccione una institución.'; err.style.display='block'; return; }
  if (getDomain(email) === 'diger.gob.hn') { err.textContent='Los correos @diger.gob.hn son administradores.'; err.style.display='block'; return; }
  // Verificar si ya existe
  var { data: existe } = await sb.from('usuarios_sol').select('email').eq('email', email).single();
  if (existe) { err.textContent='Este correo ya está registrado.'; err.style.display='block'; return; }
  var { error } = await upsertUser(email, rol, inst);
  if (error) { err.textContent='Error al guardar. Intente de nuevo.'; err.style.display='block'; return; }
  cerrarModal();
  renderTablaAccesos();
}

async function renderTablaAccesos() {
  var tbody = document.getElementById('access-tbody');
  var empty = document.getElementById('access-empty');
  if (!tbody) return;
  tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:1rem">Cargando...</td></tr>';
  var cfg = await loadConfig();
  var emails = Object.keys(cfg).sort(function(a,b){
    var ra=ROL_ORDER.indexOf(cfg[a].role||'colaborador'), rb=ROL_ORDER.indexOf(cfg[b].role||'colaborador');
    return ra-rb || a.localeCompare(b);
  });
  tbody.innerHTML = '';
  if (emails.length === 0) { empty.style.display='block'; return; }
  empty.style.display = 'none';
  emails.forEach(function(email) {
    var u   = cfg[email];
    var rol = u.role || 'colaborador';
    var inst= u.institucion || '—';
    var tr  = document.createElement('tr');
    tr.innerHTML =
      '<td class="email-cell">'+esc(email)+'</td>'+
      '<td><span class="role-badge role-'+rol+'">'+esc(ROL_LABELS[rol]||rol)+'</span></td>'+
      '<td><span class="inst-badge">'+esc(inst)+'</span></td>'+
      '<td><span style="font-size:11px;color:var(--muted)">Estado Institucional · Reuniones cerradas</span></td>'+
      '<td><button class="btn-rm" onclick="eliminarFuncionario(\''+email+'\')">Eliminar</button></td>';
    tbody.appendChild(tr);
  });
}

async function eliminarFuncionario(email) {
  if (!confirm('¿Eliminar el acceso de ' + email + '?')) return;
  await deleteUser(email);
  renderTablaAccesos();
}

// ════════════════════════════════════════════════════════════════
// COORDINADOR — SUB-USER MANAGEMENT
// ════════════════════════════════════════════════════════════════

async function renderTablaCoord() {
  var inst  = ses.institucion || '';
  var tbody = document.getElementById('coord-tbody');
  var empty = document.getElementById('coord-empty');
  if (!tbody) return;
  tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:var(--muted);padding:1rem">Cargando...</td></tr>';
  var cfg = await loadConfig();
  var subusers = Object.keys(cfg).filter(function(e){
    return cfg[e].institucion === inst && cfg[e].role !== 'coordinador';
  });
  tbody.innerHTML = '';
  if (subusers.length === 0) { empty.style.display='block'; return; }
  empty.style.display = 'none';
  subusers.forEach(function(email) {
    var u = cfg[email]; var rol = u.role || 'colaborador';
    var tr = document.createElement('tr');
    tr.innerHTML =
      '<td class="email-cell">'+esc(email)+'</td>'+
      '<td><span class="role-badge role-'+rol+'">'+esc(ROL_LABELS[rol]||rol)+'</span></td>'+
      '<td><button class="btn-rm" onclick="eliminarSubusuario(\''+email+'\')">Eliminar</button></td>';
    tbody.appendChild(tr);
  });
}

function abrirModalSubusuario() {
  abrirModal('Agregar usuario — '+esc(ses.institucion||''),
    '<div class="modal-field"><label>Correo electrónico</label>'+
    '<input class="access-inp" type="email" id="su-email" placeholder="correo@institucion.gob.hn" style="width:100%"></div>'+
    '<div class="modal-field"><label>Rol</label>'+
    '<select class="access-inp" id="su-rol" style="width:100%">'+
      '<option value="colaborador">Colaborador — puede crear y editar contenido</option>'+
      '<option value="lector">Lector — solo lectura</option>'+
    '</select></div>'+
    '<div id="su-err" style="font-size:12px;color:var(--rojo);margin-top:6px;display:none"></div>'+
    '<div class="modal-foot">'+
      '<button class="btn-ghost" onclick="cerrarModal()">Cancelar</button>'+
      '<button class="btnp" onclick="guardarSubusuario()">Guardar</button>'+
    '</div>'
  );
}

async function guardarSubusuario() {
  var email = (document.getElementById('su-email').value||'').trim().toLowerCase();
  var rol   = document.getElementById('su-rol').value;
  var err   = document.getElementById('su-err');
  var inst  = ses.institucion || '';
  err.style.display = 'none';
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { err.textContent='Ingrese un correo válido.'; err.style.display='block'; return; }
  if (getDomain(email) === 'diger.gob.hn') { err.textContent='Los correos @diger.gob.hn son administradores.'; err.style.display='block'; return; }
  var { data: existe } = await sb.from('usuarios_sol').select('email').eq('email', email).single();
  if (existe) { err.textContent='Este correo ya está registrado.'; err.style.display='block'; return; }
  var { error } = await upsertUser(email, rol, inst);
  if (error) { err.textContent='Error al guardar. Intente de nuevo.'; err.style.display='block'; return; }
  cerrarModal();
  renderTablaCoord();
}

async function eliminarSubusuario(email) {
  if (!confirm('¿Eliminar el acceso de ' + email + '?')) return;
  await deleteUser(email);
  renderTablaCoord();
}

// ════════════════════════════════════════════════════════════════
// INSTITUTION PORTAL (non-admin users)
// ════════════════════════════════════════════════════════════════
function renderInstitucionPortal() {
  if (!ses) { window.location.replace('index.html'); return; }
  var inst = ses.institucion || '';
  var rol  = ses.role || 'colaborador';
  var acc  = ses.access || {};
  document.title = esc(inst) + ' — DIGER SOL';

  // Módulos automáticos para todos los usuarios institucionales
  var AUTO_KEYS = ['levantamiento_reunion'];
  var accMods = ALL_MODULOS.filter(function(m){ return AUTO_KEYS.indexOf(m.key) !== -1; });

  // Documentos fijos disponibles en el portal institucional
  var docsInst = (UNITS.digitalizacion.documentosFijos || []);

  var INST_SVG = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>';

  var html =
    '<div class="inst-header">' +
      '<div class="inst-header-icon">' + INST_SVG + '</div>' +
      '<div>' +
        '<div class="inst-header-name">' + esc(inst||'Portal Institucional') + '</div>' +
        '<div class="inst-header-sub">' +
          '<span class="role-badge role-'+rol+'" style="background:rgba(255,255,255,.2);color:#fff;border-color:rgba(255,255,255,.3)">'+esc(ROL_LABELS[rol]||rol)+'</span>' +
          '&nbsp; DIGER — Gobierno Digital Honduras' +
        '</div>' +
      '</div>' +
    '</div>';

  // Módulos (levantamiento de reunión, etc.)
  if (accMods.length > 0) {
    html += '<div class="sec-title" style="margin-top:1.5rem">Módulos</div>';
    html += '<div class="inst-mod-grid">';
    accMods.forEach(function(m) {
      if(m.subItems) {
        // Render group header + sub-items as individual cards
        html += '<div class="inst-mod-card" style="flex-direction:column;align-items:flex-start;gap:0;padding:0;overflow:hidden;cursor:default">' +
          '<div style="display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--borde);width:100%;box-sizing:border-box">' +
            '<div class="inst-mod-card-icon">' + (SVGS[m.icon]||'') + '</div>' +
            '<div><div class="inst-mod-card-name">' + esc(m.label) + '</div><div class="inst-mod-card-desc">' + esc(m.desc) + '</div></div>' +
          '</div>';
        m.subItems.forEach(function(si){
          var siUrl = si.url + (inst ? '?inst=' + encodeURIComponent(inst) : '');
          html += '<a class="mod-sub-item" href="' + siUrl + '" style="padding:9px 14px;border-radius:0">' +
            '<div class="mod-sub-icon">' + (SVGS[si.icon]||'') + '</div>' +
            '<div><div class="mod-sub-name">' + esc(si.label) + '</div><div class="mod-sub-desc">' + esc(si.desc) + '</div></div>' +
            '<span class="btn-open" style="font-size:11px;padding:4px 10px">Abrir →</span>' +
          '</a>';
        });
        html += '</div>';
      } else {
        var url = m.url + (inst ? '?inst=' + encodeURIComponent(inst) : '');
        html +=
          '<a class="inst-mod-card" href="' + url + '">' +
            '<div class="inst-mod-card-icon">' + (SVGS[m.icon]||'') + '</div>' +
            '<div style="min-width:0">' +
              '<div class="inst-mod-card-name">' + esc(m.label) + '</div>' +
              '<div class="inst-mod-card-desc">' + esc(m.desc) + '</div>' +
            '</div>' +
            '<div class="inst-mod-card-arr">›</div>' +
          '</a>';
      }
    });
    html += '</div>';
  }

  // Documentos del sistema accesibles por la institución
  if (docsInst.length > 0) {
    html += '<div class="sec-title" style="margin-top:1.5rem">Documentos</div>';
    html += '<div class="inst-mod-grid">';
    docsInst.forEach(function(d) {
      var url = d.url + (inst ? '?inst=' + encodeURIComponent(inst) : '');
      html +=
        '<a class="inst-mod-card" href="' + url + '">' +
          '<div class="inst-mod-card-icon">' + (SVGS[d.icon]||DOC_ICO) + '</div>' +
          '<div style="min-width:0">' +
            '<div class="inst-mod-card-name">' + esc(d.nombre) + '</div>' +
            '<div class="inst-mod-card-desc">' + esc(d.desc) + '</div>' +
          '</div>' +
          '<div class="inst-mod-card-arr">›</div>' +
        '</a>';
    });
    html += '</div>';
  }

  if (accMods.length === 0 && docsInst.length === 0) {
    html += '<div class="card"><div class="empty" style="padding:2.5rem">Sin módulos habilitados. Contacte al administrador DIGER.</div></div>';
  }

  // Coordinator sub-user panel
  if (rol === 'coordinador') {
    html +=
      '<div class="card" id="coord-panel">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">' +
          '<div class="sec-title" style="margin:0;border:none;padding:0">Usuarios de ' + esc(inst) + '</div>' +
          '<button class="btn-add" onclick="abrirModalSubusuario()">+ Agregar usuario</button>' +
        '</div>' +
        '<div id="coord-table-wrap">' +
          '<table class="access-table">' +
            '<thead><tr><th>Correo</th><th>Rol</th><th></th></tr></thead>' +
            '<tbody id="coord-tbody"></tbody>' +
          '</table>' +
          '<div class="empty" id="coord-empty">No hay usuarios registrados para esta institución.</div>' +
        '</div>' +
      '</div>';
  }

  app.innerHTML = html;
  if (rol === 'coordinador') renderTablaCoord();
}
</script>
</body>
</html>
