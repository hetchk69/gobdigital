<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Administrador — Lista de asistencia DIGER</title>
  <style>
    :root {
      --azul-profundo: #0b4567;
      --azul: #1d6fa8;
      --celeste: #78cbd7;
      --fondo: #f3f6f8;
      --texto: #172b3a;
      --linea: #d7e1e8;
      --suave: #eef5f8;
      --blanco: #ffffff;
      --error: #b42318;
      --verde: #16a34a;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--fondo); color: var(--texto); font-family: "Segoe UI", Arial, Helvetica, sans-serif; }

    .top-band { height: 12px; background: linear-gradient(90deg, var(--celeste) 0 33%, var(--azul-profundo) 33% 66%, var(--azul) 66% 100%); }

    .shell { width: min(980px, calc(100% - 28px)); margin: 24px auto 40px; }

    .header, .form-card, .data-card {
      background: var(--blanco); border: 1px solid var(--linea);
      border-radius: 8px; box-shadow: 0 12px 30px rgba(23,43,58,.08);
    }
    .header {
      padding: 22px 24px; border-top: 8px solid var(--azul-profundo);
      display: grid; grid-template-columns: minmax(0,1fr) auto; gap: 20px; align-items: center;
    }
    .brand-logo { width: min(380px,100%); max-height: 76px; object-fit: contain; object-position: left center; display: block; }

    .doc-meta { display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-end; }
    .meta-pill { border: 1px solid var(--linea); border-radius: 999px; color: var(--azul-profundo); font-size: 12px; font-weight: 700; padding: 6px 10px; white-space: nowrap; }

    .form-card, .data-card { margin-top: 18px; overflow: hidden; }
    [hidden] { display: none !important; }

    .form-title { padding: 22px 24px 16px; border-bottom: 1px solid var(--linea); display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .locked-title { border: 0; color: var(--azul-profundo); font: 700 24px/1.15 "Segoe UI", Arial, Helvetica, sans-serif; padding: 0; background: transparent; }

    .event-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 16px; padding: 20px 24px; background: var(--suave); border-bottom: 1px solid var(--linea); }
    .event-full { grid-column: 1 / -1; }
    .field { display: grid; gap: 7px; }
    .field label { font-size: 14px; font-weight: 700; color: var(--azul-profundo); }

    input, select {
      width: 100%; min-height: 42px; border: 1px solid #b8c7d2; border-radius: 4px;
      background: var(--blanco); color: var(--texto); font: 15px "Segoe UI", Arial, Helvetica, sans-serif; padding: 8px 10px;
    }
    input:focus, select:focus { border-color: var(--azul); box-shadow: 0 0 0 2px rgba(29,111,168,.14); outline: 0; }
    input[readonly] { background: #e9eff3; color: #60717c; cursor: not-allowed; }

    /* Link compartir */
    .share-box { padding: 16px 24px; border-bottom: 1px solid var(--linea); background: #f0fdf4; }
    .share-label { font-size: 12px; font-weight: 700; color: var(--verde); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
    .share-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .share-inp { flex: 1; min-width: 200px; padding: 8px 12px; border: 1.5px solid #bbf7d0; border-radius: 6px; font-size: 13px; background: #fff; color: #166534; font-family: monospace; }
    .btn-copy { padding: 8px 16px; background: var(--verde); color: #fff; border: none; border-radius: 6px; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; }
    .btn-copy:hover { opacity: .88; }
    .copy-ok { font-size: 12px; font-weight: 700; color: var(--verde); min-width: 70px; }

    .status { min-height: 22px; margin: 10px 24px; font-size: 13px; font-weight: 700; color: var(--azul-profundo); }
    .status.error { color: var(--error); }

    .button-row { display: flex; flex-wrap: wrap; gap: 10px; padding: 0 24px 24px; }
    button { appearance: none; border: 1px solid var(--azul-profundo); border-radius: 4px; min-height: 40px; padding: 9px 14px; background: var(--azul-profundo); color: white; cursor: pointer; font: 700 14px "Segoe UI", Arial, Helvetica, sans-serif; }
    button.secondary { background: white; color: var(--azul-profundo); }
    button.danger { border-color: var(--error); color: var(--error); background: white; }

    .data-head { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 12px; align-items: center; padding: 18px 24px; border-bottom: 1px solid var(--linea); }
    h1, h2 { margin: 0; color: var(--azul-profundo); }
    h2 { font-size: 19px; }

    .summary { display: flex; flex-wrap: wrap; gap: 8px; padding: 16px 24px 0; }
    .institution-chip { display: inline-flex; align-items: center; gap: 8px; border: 1px solid var(--linea); border-radius: 999px; background: white; padding: 6px 10px; font-size: 13px; font-weight: 700; }
    .dot { width: 12px; height: 12px; border-radius: 50%; background: var(--azul); flex: 0 0 auto; }

    .table-wrap { overflow-x: auto; padding: 18px 24px 24px; }
    table { width: 100%; min-width: 700px; border-collapse: collapse; font-size: 14px; }
    th, td { border-bottom: 1px solid var(--linea); padding: 10px; text-align: left; vertical-align: middle; }
    th { color: var(--azul-profundo); font-size: 12px; text-transform: uppercase; background: #f8fbfc; }
    tbody tr { border-left: 6px solid var(--azul); }
    .row-actions { display: flex; gap: 8px; }
    .icon-button { min-height: 32px; padding: 5px 9px; font-size: 12px; }
    .empty { padding: 6px 0; color: #637481; font-size: 14px; }

    /* Badge admin */
    .admin-badge { display: inline-flex; align-items: center; gap: 6px; background: linear-gradient(135deg,#e8f0ff,#d5e8ff); color: #0a2d6e; font-size: 11px; font-weight: 700; padding: 4px 12px; border-radius: 20px; border: 1px solid #c0d0f0; }

    @media (max-width: 720px) {
      .shell { width: min(100%, calc(100% - 18px)); margin-top: 12px; }
      .header { grid-template-columns: 1fr; }
      .doc-meta { justify-content: flex-start; }
      .event-grid { grid-template-columns: 1fr; }
      .form-title { flex-direction: column; align-items: flex-start; }
    }
    @media print {
      body { background: white; }
      .top-band, .form-card, .button-row, .row-actions, .share-box { display: none !important; }
      .shell { width: 100%; margin: 0; }
      .header, .data-card { border: 0; box-shadow: none; }
    }
  </style>
</head>
<body>
  <div class="top-band"></div>

  <main class="shell">
    <header class="header">
      <img class="brand-logo" src="logo_diger-14.png" alt="Gobierno Digital DIGER">
      <div class="doc-meta">
        <span class="meta-pill">Version: 01</span>
        <span class="meta-pill">Codigo: LIST-001</span>
        <span class="admin-badge">⚙ Administrador</span>
      </div>
    </header>

    <!-- Datos del evento -->
    <section class="form-card">
      <div class="form-title">
        <span class="locked-title">Configuración del evento — Lista de asistencia</span>
        <span id="session-label" style="font-size:12px;color:#64748b"></span>
      </div>

      <div class="event-grid">
        <div class="field event-full">
          <label for="tema-titulo">Título del tema</label>
          <input id="tema-titulo" type="text" placeholder="Descripción corta del tema" readonly>
        </div>
        <div class="field">
          <label for="tema">Tema / motivo</label>
          <input id="tema" type="text" placeholder="Detalle del motivo de la reunión o capacitación" readonly>
        </div>
        <div class="field">
          <label for="fecha-hora">Fecha y hora</label>
          <input id="fecha-hora" type="text" placeholder="Ej: 03/06/2026 - 8:50 AM" readonly>
        </div>
      </div>

      <!-- Link para compartir -->
      <div class="share-box" id="share-box" hidden>
        <div class="share-label">🔗 Link / QR para participantes</div>
        <div class="share-row">
          <input class="share-inp" id="link-url" type="text" readonly>
          <button class="btn-copy" onclick="copiarLink()">Copiar link</button>
          <span class="copy-ok" id="copy-status"></span>
        </div>
      </div>

      <div class="status" id="status" role="status"></div>
    </section>

    <!-- Panel de registros -->
    <section class="data-card" id="admin-panel" hidden>
      <div class="data-head">
        <h2>Registros capturados</h2>
        <div class="button-row" style="padding:0">
          <button type="button" class="secondary" id="download-excel">Descargar Excel</button>
          <button type="button" class="secondary" id="print-page">Imprimir</button>
          <button type="button" class="danger" id="clear-data">Borrar datos</button>
        </div>
      </div>

      <div class="summary" id="summary"></div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>No.</th>
              <th>Nombre</th>
              <th>Correo electrónico</th>
              <th>Institución</th>
              <th>Teléfono</th>
              <th>Fecha de registro</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="records-body"></tbody>
        </table>
        <div class="empty" id="empty-state">Sin registros capturados.</div>
      </div>
    </section>
  </main>

  <script>
    const SESSION_KEY      = 'diger_sol_session';
    const storageKey       = 'diger_lista_asistencia_records';
    const eventStorageKey  = 'diger_lista_asistencia_event';
    const institutionColors = ['#78cbd7', '#0b4567', '#1d6fa8'];

    const fields = {
      temaTitulo : document.getElementById('tema-titulo'),
      tema       : document.getElementById('tema'),
      fechaHora  : document.getElementById('fecha-hora')
    };

    const status      = document.getElementById('status');
    const recordsBody = document.getElementById('records-body');
    const summary     = document.getElementById('summary');
    const emptyState  = document.getElementById('empty-state');
    const adminPanel  = document.getElementById('admin-panel');

    let records = loadRecords();

    // ── RECORDS ──────────────────────────────────────────
    function loadRecords() {
      try { return JSON.parse(localStorage.getItem(storageKey)) || []; } catch { return []; }
    }
    function saveRecords() { localStorage.setItem(storageKey, JSON.stringify(records)); }

    // ── EVENTO ───────────────────────────────────────────
    function loadEventInfo() {
      try {
        const e = JSON.parse(localStorage.getItem(eventStorageKey)) || {};
        fields.temaTitulo.value = e.temaTitulo || '';
        fields.tema.value       = e.tema       || '';
        fields.fechaHora.value  = e.fechaHora  || '';
      } catch {}
    }
    function saveEventInfo() {
      localStorage.setItem(eventStorageKey, JSON.stringify({
        temaTitulo : fields.temaTitulo.value.trim(),
        tema       : fields.tema.value.trim(),
        fechaHora  : fields.fechaHora.value.trim()
      }));
    }

    // ── UTILS ─────────────────────────────────────────────
    function normalizeInstitution(v) { return v.trim().replace(/\s+/g, ' '); }
    function colorForInstitution(inst) {
      const n = normalizeInstitution(inst).toLowerCase();
      let h = 0;
      for (let i = 0; i < n.length; i++) h = n.charCodeAt(i) + ((h << 5) - h);
      return institutionColors[Math.abs(h) % institutionColors.length];
    }
    function setStatus(msg, isError = false) {
      status.textContent = msg;
      status.classList.toggle('error', isError);
    }
    function escapeCell(v) {
      return String(v || '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;');
    }

    // ── TABLA ─────────────────────────────────────────────
    function deleteEntry(id) {
      records = records.filter(r => r.id !== id);
      saveRecords(); render();
      setStatus('Registro eliminado.');
    }
    function renderSummary() {
      const counts = records.reduce((a, r) => { a[r.institucion] = (a[r.institucion] || 0) + 1; return a; }, {});
      summary.innerHTML = Object.entries(counts).sort(([a],[b]) => a.localeCompare(b)).map(([inst, cnt]) =>
        `<span class="institution-chip"><span class="dot" style="background:${colorForInstitution(inst)}"></span>${escapeCell(inst)}: ${cnt}</span>`
      ).join('');
    }
    function renderTable() {
      emptyState.style.display = records.length ? 'none' : 'block';
      recordsBody.innerHTML = records.map((r, i) =>
        `<tr style="border-left-color:${colorForInstitution(r.institucion)}">
          <td>${i+1}</td>
          <td>${escapeCell(r.nombre)}</td>
          <td>${escapeCell(r.correo)}</td>
          <td>${escapeCell(r.institucion)}</td>
          <td>${escapeCell(r.telefono)}</td>
          <td>${escapeCell(r.registrado)}</td>
          <td><div class="row-actions">
            <button class="secondary icon-button" type="button" data-delete="${r.id}">Eliminar</button>
          </div></td>
        </tr>`
      ).join('');
    }
    function render() { renderSummary(); renderTable(); }

    // ── EXCEL ─────────────────────────────────────────────
    function buildExcelHtml() {
      return `<html><head><meta charset="utf-8"><style>
        table{border-collapse:collapse;font-family:Segoe UI,Arial}
        th,td{border:1px solid #d7e1e8;padding:8px}
        th{background:#0b4567;color:#fff}
      </style></head><body>
        <h2>Lista de asistencia DIGER</h2>
        <p><strong>Título:</strong> ${escapeCell(fields.temaTitulo.value)}</p>
        <p><strong>Tema:</strong> ${escapeCell(fields.tema.value)}</p>
        <p><strong>Fecha y hora:</strong> ${escapeCell(fields.fechaHora.value)}</p>
        <table><thead><tr><th>No.</th><th>Nombre</th><th>Correo</th><th>Institución</th><th>Teléfono</th><th>Fecha registro</th></tr></thead>
        <tbody>${records.map((r,i) => `<tr><td>${i+1}</td><td>${escapeCell(r.nombre)}</td><td>${escapeCell(r.correo)}</td><td>${escapeCell(r.institucion)}</td><td>${escapeCell(r.telefono)}</td><td>${escapeCell(r.registrado)}</td></tr>`).join('')}</tbody>
        </table></body></html>`;
    }
    function downloadExcel() {
      const blob = new Blob([buildExcelHtml()], { type: 'application/vnd.ms-excel;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'lista_asistencia_diger.xls';
      document.body.appendChild(a); a.click();
      URL.revokeObjectURL(a.href); a.remove();
      setStatus('Archivo Excel descargado.');
    }

    function clearAllData() {
      if (!confirm('¿Borrar todos los registros capturados?')) return;
      records = []; saveRecords(); render();
      setStatus('Datos borrados.');
    }

    // ── LINK PARA COMPARTIR ──────────────────────────────
    function mostrarLink() {
      const url = window.location.href.replace('levantamiento_reunion.html', '') + 'lista_asistencia.html';
      document.getElementById('link-url').value = url;
      document.getElementById('share-box').hidden = false;
    }
    function copiarLink() {
      const inp = document.getElementById('link-url');
      inp.select(); document.execCommand('copy');
      const ok = document.getElementById('copy-status');
      ok.textContent = '✓ Copiado';
      setTimeout(() => { ok.textContent = ''; }, 2500);
    }

    // ── AUTH POR SESIÓN DEL PORTAL ───────────────────────
    function verificarSesionAdmin() {
      try {
        const s = JSON.parse(sessionStorage.getItem(SESSION_KEY));
        if (s && s.role === 'admin') {
          fields.tema.removeAttribute('readonly');
          fields.temaTitulo.removeAttribute('readonly');
          fields.fechaHora.removeAttribute('readonly');
          adminPanel.removeAttribute('hidden');
          document.getElementById('session-label').textContent = '⚙ ' + s.email;
          mostrarLink();
          setStatus('Modo administrador activo.');
          return;
        }
      } catch {}
      // Sin sesión válida → pantalla de bloqueo
      document.body.innerHTML =
        '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Segoe UI,sans-serif;background:#f3f6f8">' +
        '<div style="text-align:center;background:#fff;border-radius:14px;padding:2.5rem 2rem;box-shadow:0 12px 40px rgba(0,0,0,.1);max-width:380px">' +
        '<div style="font-size:40px;margin-bottom:1rem">🔒</div>' +
        '<h2 style="color:#0b4567;margin:0 0 .5rem">Acceso restringido</h2>' +
        '<p style="color:#64748b;font-size:13px;margin-bottom:1.5rem">Esta sección es exclusiva para administradores DIGER. Ingrese desde el portal principal.</p>' +
        '<a href="index.html" style="display:inline-block;background:#0b4567;color:#fff;padding:11px 24px;border-radius:8px;text-decoration:none;font-weight:700;font-size:14px">← Ir al portal</a>' +
        '</div></div>';
    }

    // ── EVENTOS ──────────────────────────────────────────
    document.getElementById('download-excel').addEventListener('click', downloadExcel);
    document.getElementById('print-page').addEventListener('click', () => window.print());
    document.getElementById('clear-data').addEventListener('click', clearAllData);
    recordsBody.addEventListener('click', ev => {
      const btn = ev.target.closest('[data-delete]');
      if (btn) deleteEntry(Number(btn.dataset.delete));
    });
    fields.temaTitulo.addEventListener('change', saveEventInfo);
    fields.tema.addEventListener('change', saveEventInfo);
    fields.fechaHora.addEventListener('change', saveEventInfo);

    loadEventInfo();
    verificarSesionAdmin();
    render();
  </script>
</body>
</html>
