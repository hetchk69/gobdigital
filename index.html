<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal DIGER — Plataforma SOL</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="header.js"></script>
<style>
:root{
  --azul:#0a2d6e;--azul-m:#1455a4;--azul-c:#e8f0ff;
  --gris:#eef1f7;--borde:#dde4f0;--texto:#1c2333;--muted:#64748b;
  --verde:#16a34a;--rojo:#dc2626;--blanco:#fff;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;color:var(--texto);background:var(--gris);min-height:100vh}

/* ── PANTALLA LOGIN ── */
#screen-login{
  display:flex;align-items:center;justify-content:center;
  min-height:calc(100vh - 90px);padding:2rem 1rem;
}
.login-card{
  background:var(--blanco);border-radius:20px;
  box-shadow:0 20px 60px rgba(10,45,110,.14);
  padding:2.75rem 2.25rem;max-width:420px;width:100%;
  text-align:center;
}
.login-icon{
  width:72px;height:72px;border-radius:50%;
  background:linear-gradient(135deg,var(--azul-m),var(--azul));
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 1.4rem;font-size:28px;
  box-shadow:0 8px 24px rgba(10,45,110,.3);
}
.login-card h1{font-size:20px;font-weight:800;color:var(--azul);margin-bottom:.3rem}
.login-card p{font-size:13px;color:var(--muted);margin-bottom:1.5rem;line-height:1.6}
.login-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;text-align:left;margin-bottom:5px;display:block}
.login-inp{
  width:100%;padding:12px 14px;border:1.5px solid var(--borde);border-radius:10px;
  font-size:14px;font-family:inherit;outline:none;
  transition:border .2s,box-shadow .2s;margin-bottom:.9rem;
}
.login-inp:focus{border-color:var(--azul-m);box-shadow:0 0 0 4px rgba(20,85,164,.1)}
.login-btn{
  width:100%;padding:13px;
  background:linear-gradient(135deg,var(--azul-m),var(--azul));
  color:#fff;border:none;border-radius:10px;
  font-size:14px;font-weight:700;cursor:pointer;transition:opacity .2s;
  font-family:inherit;
}
.login-btn:hover{opacity:.9}
.login-btn:disabled{opacity:.6;cursor:not-allowed}
.login-err{
  font-size:12px;color:var(--rojo);background:#fff5f5;
  border:1px solid #fecaca;border-radius:8px;
  padding:8px 12px;margin-bottom:.8rem;display:none;text-align:left;
}

/* ── PANTALLA UNIDADES ── */
#screen-unidades{display:none}
.container{max-width:900px;margin:0 auto;padding:2rem 1rem 3rem}
.welcome{margin-bottom:1.75rem}
.welcome h2{font-size:22px;font-weight:800;color:var(--azul);margin-bottom:.25rem}
.welcome p{font-size:13px;color:var(--muted)}
.badge{
  display:inline-flex;align-items:center;gap:6px;
  background:linear-gradient(135deg,var(--azul-c),#d5e8ff);
  color:var(--azul);font-size:11px;font-weight:700;
  padding:4px 12px;border-radius:20px;border:1px solid #c0d0f0;
  margin-bottom:.75rem;
}
.card{
  background:var(--blanco);border:1px solid var(--borde);
  border-radius:14px;padding:1.4rem;margin-bottom:1.1rem;
  box-shadow:0 2px 8px rgba(10,45,110,.06);
}
.card-title{
  font-size:11px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.08em;
  margin-bottom:1.1rem;padding-bottom:.6rem;
  border-bottom:2px solid var(--gris);
  display:flex;align-items:center;gap:6px;
}

/* ── GRID DE UNIDADES ── */
.unit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.unit-card{
  background:var(--blanco);border:1.5px solid var(--borde);
  border-radius:13px;padding:1.3rem;
  transition:all .22s;cursor:pointer;
  display:flex;flex-direction:column;gap:10px;
}
.unit-card:hover{border-color:var(--azul-m);box-shadow:0 6px 20px rgba(10,45,110,.12);transform:translateY(-2px)}
.unit-icon{
  width:48px;height:48px;border-radius:11px;
  background:linear-gradient(135deg,var(--azul-c),#d5e8ff);
  display:flex;align-items:center;justify-content:center;font-size:24px;
}
.unit-name{font-size:15px;font-weight:700;color:var(--azul)}
.unit-role{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.unit-desc{font-size:12px;color:var(--muted);line-height:1.5}
.unit-card.add-new{border-style:dashed;border-color:var(--borde);align-items:center;justify-content:center;text-align:center;color:var(--muted);min-height:120px;gap:8px}
.unit-card.add-new:hover{border-color:var(--azul-m);color:var(--azul)}
.unit-card.add-new .add-icon{font-size:28px}
.unit-card.add-new .add-label{font-size:13px;font-weight:700}

/* ── MODAL NUEVA UNIDAD ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(10,45,110,.45);
  display:flex;align-items:center;justify-content:center;
  z-index:10000;padding:1rem;
}
.modal-card{
  background:#fff;border-radius:14px;
  box-shadow:0 24px 64px rgba(10,45,110,.22);
  width:100%;max-width:480px;padding:24px;
}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-title{font-size:16px;font-weight:800;color:var(--azul)}
.modal-close{background:none;border:none;cursor:pointer;font-size:20px;color:var(--muted);padding:4px 8px;border-radius:6px}
.modal-close:hover{background:var(--gris)}
.form-group{margin-bottom:14px}
.form-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:5px}
.form-inp{width:100%;padding:10px 13px;border:1.5px solid var(--borde);border-radius:9px;font-size:14px;font-family:inherit;outline:none;transition:border .2s}
.form-inp:focus{border-color:var(--azul-m);box-shadow:0 0 0 3px rgba(20,85,164,.09)}
.modal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:18px}
.btn-cancel{padding:9px 18px;border:1.5px solid var(--borde);background:#fff;color:var(--muted);border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-cancel:hover{border-color:var(--azul-m);color:var(--azul)}
.btn-primary{padding:9px 22px;background:linear-gradient(135deg,var(--azul-m),var(--azul));color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .18s}
.btn-primary:hover{opacity:.88}
.btn-primary:disabled{opacity:.55;cursor:not-allowed}

.empty{padding:2rem;text-align:center;color:var(--muted);font-size:13px}
.loading{padding:2rem;text-align:center;color:var(--muted);font-size:13px}

@media(max-width:600px){
  .container{padding:1rem .75rem 2rem}
  .unit-grid{grid-template-columns:1fr}
  .card{padding:1.1rem;border-radius:11px}
}
</style>
</head>
<body>

<div id="app-header"></div>

<!-- ═══ PANTALLA LOGIN ═══ -->
<div id="screen-login">
  <div class="login-card">
    <div class="login-icon">🏛</div>
    <h1>Plataforma SOL — DIGER</h1>
    <p>Ingrese su correo institucional para acceder a las unidades habilitadas.</p>
    <span class="login-label">Correo institucional</span>
    <input class="login-inp" type="email" id="login-email" placeholder="nombre@institucion.gob.hn" autocomplete="email">
    <div class="login-err" id="login-err"></div>
    <button class="login-btn" id="login-btn" onclick="iniciarSesion()">Ingresar →</button>
  </div>
</div>

<!-- ═══ PANTALLA UNIDADES ═══ -->
<div id="screen-unidades">
  <div class="container">
    <div class="welcome">
      <div class="badge" id="role-badge">👤 Funcionario</div>
      <h2 id="saludo">Bienvenido</h2>
      <p>Seleccione la unidad a la que desea acceder.</p>
    </div>
    <div class="card">
      <div class="card-title">🏢 Mis Unidades</div>
      <div id="units-loading" class="loading">Cargando unidades...</div>
      <div class="unit-grid" id="unit-grid" style="display:none"></div>
    </div>
  </div>
</div>

<!-- Modal nueva unidad -->
<div id="modal-nueva-unidad" class="modal-overlay" style="display:none">
  <div class="modal-card">
    <div class="modal-header">
      <span class="modal-title">Nueva Unidad</span>
      <button class="modal-close" onclick="cerrarModalUnidad()">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Nombre</label>
      <input class="form-inp" type="text" id="nu-nombre" placeholder="Ej: Proyectos Especiales" required>
    </div>
    <div class="form-group">
      <label class="form-label">Slug (identificador único)</label>
      <input class="form-inp" type="text" id="nu-slug" placeholder="Ej: proyectos-especiales" required>
    </div>
    <div class="form-group">
      <label class="form-label">Descripción (opcional)</label>
      <input class="form-inp" type="text" id="nu-desc" placeholder="Descripción breve de la unidad">
    </div>
    <div class="form-group">
      <label class="form-label">Ícono (emoji)</label>
      <input class="form-inp" type="text" id="nu-icono" placeholder="🏢" maxlength="4" value="🏢">
    </div>
    <div id="modal-unit-err" style="font-size:12px;color:var(--rojo);display:none;margin-top:8px"></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="cerrarModalUnidad()">Cancelar</button>
      <button class="btn-primary" id="btn-crear-unidad" onclick="crearUnidad()">Crear Unidad</button>
    </div>
  </div>
</div>

<script>
// ── CONFIGURACIÓN SUPABASE ────────────────────────────────────────
const SUPABASE_URL  = 'YOUR_SUPABASE_URL';
const SUPABASE_ANON = 'YOUR_SUPABASE_ANON_KEY';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const SESSION_KEY  = 'diger_sol_session';
const ADMIN_DOMAIN = 'diger.gob.hn';

// ── INIT HEADER (solo logos, sin nav) ────────────────────────────
initHeader({ page: 'index' });

// ── UTILS ─────────────────────────────────────────────────────────
function getEmailDomain(email) {
  return (email.split('@')[1] || '').toLowerCase();
}
function showErr(id, msg) {
  var el = document.getElementById(id);
  el.textContent = msg;
  el.style.display = 'block';
}
function hideErr(id) {
  document.getElementById(id).style.display = 'none';
}

// ── AUTO RESTORE ──────────────────────────────────────────────────
(function() {
  var raw = sessionStorage.getItem(SESSION_KEY);
  if (!raw) return;
  try {
    var s = JSON.parse(raw);
    if (s && s.email) mostrarUnidades(s);
  } catch {}
})();

// ── LOGIN ─────────────────────────────────────────────────────────
async function iniciarSesion() {
  var email = (document.getElementById('login-email').value || '').trim().toLowerCase();
  hideErr('login-err');

  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    showErr('login-err', 'Ingrese un correo válido.');
    return;
  }

  var btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.textContent = 'Verificando...';

  try {
    var session;

    if (getEmailDomain(email) === ADMIN_DOMAIN) {
      // Admin: cargar todas las unidades con permisos completos
      var { data: unidades, error } = await supabase.from('unidades').select('*').order('nombre');
      if (error) throw error;

      session = {
        email: email,
        role: 'admin',
        unidades: (unidades || []).map(u => ({
          id: u.id,
          slug: u.slug,
          nombre: u.nombre,
          icono: u.icono || '🏢',
          permisos: { calendario: true, repositorio: true, tramites: true, documentos: true, miembros: true }
        }))
      };

    } else {
      // Funcionario: buscar membresías
      var { data: memberships, error: e2 } = await supabase
        .from('unidad_miembros')
        .select('rol, permisos, unidades(id, slug, nombre, icono)')
        .eq('email', email);
      if (e2) throw e2;

      if (!memberships || memberships.length === 0) {
        showErr('login-err', 'Acceso no autorizado. Consulte con el administrador DIGER.');
        return;
      }

      session = {
        email: email,
        role: memberships[0].rol || 'lector',
        unidades: memberships.map(m => ({
          id: m.unidades.id,
          slug: m.unidades.slug,
          nombre: m.unidades.nombre,
          icono: m.unidades.icono || '🏢',
          rol: m.rol,
          permisos: m.permisos || {}
        }))
      };
    }

    sessionStorage.setItem(SESSION_KEY, JSON.stringify(session));
    mostrarUnidades(session);

  } catch (err) {
    showErr('login-err', 'Error al verificar acceso: ' + (err.message || 'Intente de nuevo.'));
  } finally {
    btn.disabled = false;
    btn.textContent = 'Ingresar →';
  }
}

document.addEventListener('keydown', function(ev) {
  if (ev.key === 'Enter' && document.getElementById('screen-login').style.display !== 'none') {
    iniciarSesion();
  }
});

// ── MOSTRAR UNIDADES ──────────────────────────────────────────────
function mostrarUnidades(session) {
  document.getElementById('screen-login').style.display = 'none';
  document.getElementById('screen-unidades').style.display = 'block';

  var isAdmin = session.role === 'admin';
  document.getElementById('role-badge').textContent = isAdmin ? '⚙ Administrador' : '👤 ' + (session.role || 'Funcionario');
  document.getElementById('saludo').textContent = 'Hola, ' + session.email;

  var grid = document.getElementById('unit-grid');
  var loading = document.getElementById('units-loading');
  loading.style.display = 'none';
  grid.style.display = 'grid';
  grid.innerHTML = '';

  var unidades = session.unidades || [];

  if (unidades.length === 0) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1">No tiene unidades asignadas. Contacte al administrador.</div>';
  } else {
    unidades.forEach(function(u) {
      var card = document.createElement('div');
      card.className = 'unit-card';
      card.innerHTML =
        '<div class="unit-icon">' + (u.icono || '🏢') + '</div>' +
        '<div class="unit-name">' + esc(u.nombre) + '</div>' +
        (u.rol ? '<div class="unit-role">' + esc(u.rol) + '</div>' : '') +
        (u.descripcion ? '<div class="unit-desc">' + esc(u.descripcion) + '</div>' : '');
      card.onclick = function() {
        window.location.href = 'unidad.html?u=' + encodeURIComponent(u.slug);
      };
      grid.appendChild(card);
    });
  }

  // Si admin: botón crear nueva unidad
  if (isAdmin) {
    var addCard = document.createElement('div');
    addCard.className = 'unit-card add-new';
    addCard.innerHTML = '<div class="add-icon">➕</div><div class="add-label">Nueva Unidad</div>';
    addCard.onclick = function() { abrirModalUnidad(); };
    grid.appendChild(addCard);
  }
}

// ── MODAL NUEVA UNIDAD ────────────────────────────────────────────
function abrirModalUnidad() {
  document.getElementById('modal-nueva-unidad').style.display = 'flex';
  document.getElementById('nu-nombre').focus();
  // Auto-generar slug al escribir nombre
  document.getElementById('nu-nombre').oninput = function() {
    document.getElementById('nu-slug').value = this.value
      .toLowerCase().trim()
      .replace(/\s+/g, '-')
      .replace(/[^a-z0-9-]/g, '')
      .replace(/-+/g, '-');
  };
}
function cerrarModalUnidad() {
  document.getElementById('modal-nueva-unidad').style.display = 'none';
  ['nu-nombre','nu-slug','nu-desc','nu-icono'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.value = id === 'nu-icono' ? '🏢' : '';
  });
  document.getElementById('modal-unit-err').style.display = 'none';
}

async function crearUnidad() {
  var nombre = document.getElementById('nu-nombre').value.trim();
  var slug   = document.getElementById('nu-slug').value.trim();
  var desc   = document.getElementById('nu-desc').value.trim();
  var icono  = document.getElementById('nu-icono').value.trim() || '🏢';
  var errEl  = document.getElementById('modal-unit-err');
  errEl.style.display = 'none';

  if (!nombre || !slug) {
    errEl.textContent = 'Nombre y slug son obligatorios.';
    errEl.style.display = 'block';
    return;
  }
  if (!/^[a-z0-9-]+$/.test(slug)) {
    errEl.textContent = 'El slug solo puede contener letras minúsculas, números y guiones.';
    errEl.style.display = 'block';
    return;
  }

  var btn = document.getElementById('btn-crear-unidad');
  btn.disabled = true;

  try {
    var { data, error } = await supabase
      .from('unidades')
      .insert([{ slug, nombre, descripcion: desc || null, icono }])
      .select()
      .single();
    if (error) throw error;

    // Actualizar sesión con nueva unidad
    var raw = sessionStorage.getItem(SESSION_KEY);
    if (raw) {
      var session = JSON.parse(raw);
      session.unidades.push({
        id: data.id, slug: data.slug, nombre: data.nombre, icono: data.icono,
        permisos: { calendario:true, repositorio:true, tramites:true, documentos:true, miembros:true }
      });
      sessionStorage.setItem(SESSION_KEY, JSON.stringify(session));
      cerrarModalUnidad();
      mostrarUnidades(session);
    }
  } catch (err) {
    errEl.textContent = 'Error al crear unidad: ' + (err.message || 'Intente de nuevo.');
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
  }
}

function esc(v) {
  return String(v || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
