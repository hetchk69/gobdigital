<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal DIGER — Plataforma SOL</title>
<style>
:root{
  --azul:#0a2d6e;--azul-m:#1455a4;--azul-c:#e8f0ff;
  --gris:#eef1f7;--borde:#dde4f0;--texto:#1c2333;--muted:#64748b;
  --rojo:#dc2626;--blanco:#fff;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;color:var(--texto);background:var(--gris);min-height:100vh}

/* ── HEADER (inline — no session yet) ── */
.header{
  background:var(--blanco);padding:14px 2rem;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 2px 12px rgba(0,0,0,.08);
  position:relative;overflow:hidden;
}
.header::before{content:'';position:absolute;right:0;top:0;bottom:0;width:200px;background:linear-gradient(135deg,transparent 30px,#1455a4 30px)}
.header::after{content:'';position:absolute;right:0;top:0;bottom:0;width:130px;background:linear-gradient(135deg,transparent 30px,#0a2d6e 30px)}
.header img{height:60px;width:auto;position:relative;z-index:1}

/* ── LOGIN SCREEN ── */
.screen-login{
  display:flex;align-items:center;justify-content:center;
  min-height:calc(100vh - 90px);padding:2rem 1rem;
}
.login-card{
  background:var(--blanco);border-radius:20px;
  box-shadow:0 20px 60px rgba(10,45,110,.14);
  padding:2.75rem 2.25rem;max-width:420px;width:100%;
  text-align:center;
}
.login-icon{
  width:72px;height:72px;border-radius:50%;
  background:linear-gradient(135deg,var(--azul-m),var(--azul));
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 1.4rem;font-size:28px;
  box-shadow:0 8px 24px rgba(10,45,110,.3);
}
.login-card h1{font-size:20px;font-weight:800;color:var(--azul);margin-bottom:.3rem}
.login-card p{font-size:13px;color:var(--muted);margin-bottom:1.5rem;line-height:1.6}
.login-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;text-align:left;margin-bottom:5px;display:block}
.login-inp{
  width:100%;padding:12px 14px;border:1.5px solid var(--borde);border-radius:10px;
  font-size:14px;font-family:inherit;outline:none;
  transition:border .2s,box-shadow .2s;margin-bottom:.9rem;
}
.login-inp:focus{border-color:var(--azul-m);box-shadow:0 0 0 4px rgba(20,85,164,.1)}
.login-btn{
  width:100%;padding:13px;
  background:linear-gradient(135deg,var(--azul-m),var(--azul));
  color:#fff;border:none;border-radius:10px;
  font-size:14px;font-weight:700;cursor:pointer;transition:opacity .2s;
}
.login-btn:hover{opacity:.9}
.login-err{
  font-size:12px;color:var(--rojo);background:#fff5f5;
  border:1px solid #fecaca;border-radius:8px;
  padding:8px 12px;margin-bottom:.8rem;display:none;text-align:left;
}

@media(max-width:500px){
  .login-card{padding:2rem 1.25rem;border-radius:14px}
  .screen-login{padding:1.5rem .75rem}
}
</style>
</head>
<body>

<!-- Header (static — user not logged in yet) -->
<div class="header">
  <img src="logo_diger-14.png" alt="Gobierno de Honduras — DIGER">
</div>

<!-- Login -->
<div class="screen-login">
  <div class="login-card">
    <div class="login-icon">🏛</div>
    <h1>Plataforma SOL — DIGER</h1>
    <p>Ingrese su correo institucional para acceder a los módulos habilitados.</p>
    <span class="login-label">Correo institucional</span>
    <input class="login-inp" type="email" id="login-email"
           placeholder="nombre@institucion.gob.hn" autocomplete="email">
    <div class="login-err" id="login-err"></div>
    <button class="login-btn" onclick="iniciarSesion()">Ingresar →</button>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────
var ADMIN_DOMAIN = 'diger.gob.hn';
var CONFIG_KEY   = 'diger_sol_config';
var SESSION_KEY  = 'diger_sol_session';

function loadConfig() {
  try { return JSON.parse(localStorage.getItem(CONFIG_KEY)) || {}; } catch { return {}; }
}
function getDomain(email) { return (email.split('@')[1] || '').toLowerCase(); }

// ── LOGIN ────────────────────────────────────────────────────────
function iniciarSesion() {
  var email = document.getElementById('login-email').value.trim().toLowerCase();
  var err   = document.getElementById('login-err');
  err.style.display = 'none';

  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    showErr('Ingrese un correo válido.');
    return;
  }

  var domain = getDomain(email);

  // ── Admin ──
  if (domain === ADMIN_DOMAIN) {
    sessionStorage.setItem(SESSION_KEY, JSON.stringify({ email: email, role: 'admin' }));
    window.location.href = 'unidad.html';
    return;
  }

  // ── Funcionario ──
  var cfg = loadConfig();
  if (cfg[email]) {
    sessionStorage.setItem(SESSION_KEY, JSON.stringify({ email: email, role: 'funcionario', access: cfg[email] }));
    window.location.href = 'unidad.html';
    return;
  }

  showErr('Acceso no autorizado. Consulte con el administrador DIGER.');
}

function showErr(msg) {
  var err = document.getElementById('login-err');
  err.textContent = msg;
  err.style.display = 'block';
}

document.addEventListener('keydown', function(ev) {
  if (ev.key === 'Enter') iniciarSesion();
});

// ── AUTO-RESTORE: if already logged in, go directly to unidad ──
(function() {
  try {
    var s = JSON.parse(sessionStorage.getItem(SESSION_KEY));
    if (s && s.role) window.location.replace('unidad.html');
  } catch {}
})();
</script>
</body>
</html>
